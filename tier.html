/* 초월 등급표 */

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:#1a1a2e;color:#eee;padding:12px}

/* 검색/필터 */
#top{margin-bottom:12px}
#search-bar{display:flex;gap:8px;margin-bottom:8px}
#search-bar input{flex:1;padding:16px 20px;border:1px solid #444;border-radius:8px;font-size:16px;background:#2a2a3e;color:#eee}
#search-bar input::placeholder{color:#888}
#filter-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.ftag{padding:4px 10px;border-radius:20px;font-size:11px;border:1px solid #555;cursor:pointer;background:#2a2a3e;color:#aaa}
.ftag.active{background:#4a90d9;color:#fff;border-color:#4a90d9}
#count{font-size:12px;color:#888;margin-bottom:8px}

/* 속성 패널 그리드 */
#panels{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}

/* 패널 */
.panel{border-radius:10px;overflow:hidden;border:1px solid #333}
.panel-header{display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:15px;font-weight:700}
.panel-header .elem-icon{width:36px;height:36px;border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(0,0,0,0.2)}
.panel-header .elem-icon img{width:100%;height:100%;object-fit:cover}

/* 속성별 헤더 색상 */
.panel-땅 .panel-header{background:linear-gradient(90deg,#b5651d,#d4863a)}
.panel-물 .panel-header{background:linear-gradient(90deg,#1565c0,#1e88e5)}
.panel-불 .panel-header{background:linear-gradient(90deg,#b71c1c,#e53935)}
.panel-바람 .panel-header{background:linear-gradient(90deg,#1b5e20,#388e3c)}
.panel-빛 .panel-header{background:linear-gradient(90deg,#e65100,#fb8c00)}
.panel-어둠 .panel-header{background:linear-gradient(90deg,#311b92,#5e35b1)}
.panel-황혼 .panel-header{background:linear-gradient(90deg,#880e4f,#c2185b)}
.panel-여명 .panel-header{background:linear-gradient(90deg,#4e342e,#795548)}
.panel-악몽 .panel-header{background:linear-gradient(90deg,#4a148c,#7b1fa2)}

/* 테이블 */
.panel table{width:100%;border-collapse:collapse;font-size:12px;background:#1e1e30;min-width:0}
.panel thead tr{background:#252538}
.panel th{padding:6px 8px;text-align:center;font-weight:500;color:#aaa;border-bottom:1px solid #333;white-space:nowrap;font-size:11px}
.panel th.left{text-align:left}
.panel td{padding:5px 8px;border-bottom:0.5px solid #2a2a3e;vertical-align:middle;color:#ddd}
.panel td.center{text-align:center}
.panel tr:hover td{background:#252540}

/* 순위 */
.rank{font-size:11px;color:#888;text-align:center;width:24px}

/* 드래곤 이미지 */
.dragon-img{width:36px;height:36px;border-radius:6px;object-fit:cover;display:block}
.img-placeholder{width:36px;height:36px;border-radius:6px;background:#2a2a3e;border:1px dashed #444;display:flex;align-items:center;justify-content:center;color:#555;font-size:10px}

/* 타입 뱃지 */
.badge-type{font-size:10px;padding:2px 5px;border-radius:6px;background:#2e2e4a;color:#aaa;white-space:nowrap}

/* 레벨업 */
.lv-o{color:#66bb6a;font-weight:700}
.lv-x{color:#ef5350;font-weight:700}

/* 등급 색상 */
.t-blue  {color:#5dcff5 !important;font-weight:700;font-size:13px;text-shadow:0 0 6px rgba(93,207,245,0.6)}
.t-gold  {color:#f5c842 !important;font-weight:700;font-size:13px;text-shadow:0 0 6px rgba(245,200,66,0.5)}
.t-silver{color:#a8b4c0 !important;font-weight:700;font-size:13px;text-shadow:0 0 4px rgba(168,180,192,0.4)}
.t-pink  {color:#c4879e !important;font-weight:700;font-size:13px;text-shadow:0 0 4px rgba(196,135,158,0.4)}
.t-neg   {color:#ef5350 !important;font-weight:700;font-size:13px}

.no-data td{text-align:center;padding:1rem;color:#555}
/* 속성별 행 그라데이션 */
.panel-땅 tr.ex-true { background: linear-gradient(90deg, rgba(181,101,29,0.25) 0%, transparent 30%); }
.panel-물 tr.ex-true { background: linear-gradient(90deg, rgba(21,101,192,0.25) 0%, transparent 30%); }
.panel-불 tr.ex-true { background: linear-gradient(90deg, rgba(183,28,28,0.25) 0%, transparent 30%); }

.panel-빛 tr.ex-true { background: linear-gradient(90deg, rgba(230,81,0,0.25) 0%, transparent 30%); }
.panel-어둠 tr.ex-true { background: linear-gradient(90deg, rgba(49,27,146,0.25) 0%, transparent 30%); }
.panel-황혼 tr.ex-true { background: linear-gradient(90deg, rgba(136,14,79,0.25) 0%, transparent 30%); }
.panel-여명 tr.ex-true { background: linear-gradient(90deg, rgba(78,52,46,0.3) 0%, transparent 30%); }
.panel-악몽 tr.ex-true { background: linear-gradient(90deg, rgba(74,20,140,0.25) 0%, transparent 30%); }

const tierElemOrder=["땅","물","불","바람","빛","어둠","황혼","여명","악몽"];
const tierTypes=["전체","공방","공격","방어","체공","체방","체력"];
let eTFilters=new Set(); let tTFilters=new Set();

function buildFilters(){
  const fr=document.getElementById("filter-row");
  fr.innerHTML="";

  // 속성 필터
  const eLabel=document.createElement("span");
  eLabel.textContent="속성";
  eLabel.style="font-size:11px;color:#888;align-self:center;margin-right:2px";
  fr.appendChild(eLabel);
  ["땅","물","불","바람","빛","어둠","황혼","여명","악몽"].forEach(e=>{
    const b=document.createElement("button");
    b.className="ftag"+(eTFilters.has(e)?" active":"");
    b.textContent=e;
    b.onclick=()=>{
      if(eTFilters.has(e)) eTFilters.delete(e);
      else eTFilters.add(e);
      render();
    };
    fr.appendChild(b);
  });

  // 구분선
  const sep=document.createElement("div");
  sep.style="width:100%;height:6px";
  fr.appendChild(sep);

  // 타입 필터
  const tLabel=document.createElement("span");
  tLabel.textContent="타입";
  tLabel.style="font-size:11px;color:#888;align-self:center;margin-right:2px";
  fr.appendChild(tLabel);
  ["체력","공격","방어","체공","체방","공방"].forEach(t=>{
    const b=document.createElement("button");
    b.className="ftag"+(tTFilters.has(t)?" active":"");
    b.textContent=t;
    b.onclick=()=>{
      if(tTFilters.has(t)) tTFilters.delete(t);
      else tTFilters.add(t);
      render();
    };
    fr.appendChild(b);
  });
}

function render(){
  buildFilters();
  const q=document.getElementById("q").value.trim();
  const panels=document.getElementById("panels");
  panels.innerHTML="";

  let total=0;
  const filteredElems=eTFilters.size>0?tierElemOrder.filter(e=>eTFilters.has(e)):tierElemOrder;
  filteredElems.forEach(elem=>{
    let list=data.filter(d=>d.e===elem);
    if(tTFilters.size>0) list=list.filter(d=>tTFilters.has(d.t));
    if(q) list=list.filter(d=>d.n.includes(q));
    if(!list.length) return;
    list=list.slice().sort((a,b)=>b.g-a.g);
    total+=list.length;

    const cfg=elemConfig[elem];
    const panel=document.createElement("div");
    panel.className=`panel panel-${elem}`;

    // 헤더
    const iconHtml=cfg.icon
      ?`<div class="elem-icon"><img src="${cfg.icon}" alt="${elem}"></div>`
      :`<div class="elem-icon" style="font-size:18px;background:rgba(0,0,0,0.25);width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center">${elem[0]}</div>`;

    let rows="";
    list.forEach((d,i)=>{
      const imgMap={"땅":"img1","물":"img2","불":"img3","바람":"img4","빛":"img5","어둠":"img6","황혼":"img7","여명":"img8","악몽":"img9"};
      const imgKey=imgMap[d.e]||"img1";
      const imgSrc=d[imgKey]||"";
      const imgCell=imgSrc
        ?`<img src="${imgSrc}" class="dragon-img" alt="${d.n}">`
        :`<div class="img-placeholder"></div>`;
      rows+=`<tr class="${d.ex?'ex-true':'ex-false'}">`+`
        <td class="center rank">${i+1}</td>
        <td class="center" style="width:42px">${imgCell}</td>
        <td class="center"><span class="badge-type">${d.t}</span></td>
        <td style="font-size:12px;font-weight:500">${d.n}</td>
        <td class="center ${d.lv==='O'?'lv-o':'lv-x'}">${d.lv}</td>
        <td class="center ${tierClass(d.g)}">${Number.isInteger(d.g)?d.g.toFixed(1):d.g}</td>
      </tr>`;
    });

    panel.innerHTML=`
      <div class="panel-header">
        ${iconHtml}
        <span>${cfg.label}</span>
      </div>
      <table>
        <thead><tr>
          <th style="width:24px"></th>
          <th style="width:42px"></th>
          <th class="center">타입</th>
          <th class="left">드래곤</th>
          <th class="center">레벨업</th>
          <th class="center">등급</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    panels.appendChild(panel);
  });

  document.getElementById("count").textContent=`${total}마리`;
}
