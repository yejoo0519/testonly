<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>길드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:#1a1a2e;color:#eee;padding:12px}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;border:1px solid #333;background:#1e1e30;color:#aaa;font-size:12px;text-decoration:none;margin-bottom:16px;transition:all 0.15s}
.back-btn:hover{border-color:#5dcff5;color:#eee}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.header h1{font-size:20px;color:#aaa}
.header-right{display:flex;align-items:center;gap:8px}
.user-info{font-size:12px;color:#5dcff5;font-weight:600}
.btn{padding:7px 14px;border-radius:20px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s}
.btn-primary{background:rgba(93,207,245,0.15);color:#5dcff5;border:1px solid rgba(93,207,245,0.3)}
.btn-primary:hover{background:rgba(93,207,245,0.25)}
.btn-gray{background:#252538;color:#aaa;border:1px solid #333}
.btn-gray:hover{border-color:#5dcff5;color:#eee}
.btn-danger{background:rgba(239,83,80,0.1);color:#ef5350;border:1px solid rgba(239,83,80,0.2)}
.write-form{background:#1e1e30;border:1px solid #333;border-radius:10px;padding:16px;margin-bottom:16px}
.write-form input,.write-form textarea{width:100%;padding:9px 12px;background:#252538;border:1px solid #444;border-radius:8px;color:#eee;font-size:13px;font-family:inherit;margin-bottom:8px}
.write-form textarea{min-height:100px;resize:vertical}
.write-form input:focus,.write-form textarea:focus{outline:none;border-color:#5dcff5}
.write-form-btns{display:flex;justify-content:flex-end;gap:8px}
.guild-table{width:100%;border-collapse:collapse;background:#1e1e30;border:1px solid #333;border-radius:10px;overflow:hidden}
.guild-table th{background:#252538;padding:10px 14px;font-size:12px;font-weight:700;color:#5dcff5;text-align:left;border-bottom:1px solid #333}
.guild-table th.num{width:60px;text-align:center}
.guild-table th.author{width:90px;text-align:center}
.guild-table th.likes{width:60px;text-align:center}
.guild-table th.date{width:110px;text-align:center}
.guild-table td{padding:12px 14px;font-size:13px;border-bottom:1px solid #2a2a3e;color:#ddd}
.guild-table td.num{text-align:center;color:#666;font-size:12px}
.guild-table td.author{text-align:center;color:#aaa;font-size:12px}
.guild-table td.likes{text-align:center;color:#f5c842;font-size:12px}
.guild-table td.date{text-align:center;color:#666;font-size:12px}
.guild-table tr:last-child td{border-bottom:none}
.guild-table tr:hover td{background:#252538;cursor:pointer}
.guild-title-link{color:#ddd;text-decoration:none;font-size:13px;display:flex;align-items:center;gap:8px}
.guild-title-link:hover{color:#5dcff5}
.guild-logo-small{width:28px;height:28px;border-radius:6px;object-fit:cover;border:1px solid #333;background:#252538;flex-shrink:0}
.empty{text-align:center;color:#555;font-size:13px;padding:32px 0}
.section-divider{font-size:12px;color:#666;padding:8px 14px;background:#252538;border-top:1px solid #333;border-bottom:1px solid #333}
</style>
</head>
<body>
<a href="./index.html" class="back-btn">← 메인으로</a>

<div class="header">
  <h1>길드</h1>
  <div class="header-right" id="header-right">
    <span class="user-info" id="user-info"></span>
    <button class="btn btn-gray" id="auth-btn"></button>
    <button class="btn btn-primary" id="write-btn" style="display:none" onclick="toggleForm()">홍보 글쓰기</button>
  </div>
</div>

<div class="write-form" id="write-form" style="display:none">
  <input id="post-title" type="text" placeholder="길드명 및 제목">
  <textarea id="post-content" placeholder="길드 소개, 모집 조건 등을 입력하세요"></textarea>
  <div class="write-form-btns">
    <button class="btn btn-gray" onclick="toggleForm()">취소</button>
    <button class="btn btn-primary" onclick="submitPost()">등록</button>
  </div>
</div>

<table class="guild-table">
  <thead>
    <tr>
      <th class="num">번호</th>
      <th>길드명</th>
      <th class="author">작성자</th>
      <th class="likes">추천</th>
      <th class="date">등록일</th>
    </tr>
  </thead>
  <tbody id="guild-list-body"></tbody>
</table>

<script src="./sb_config.js"></script>
<script src="./data2/guild_list.js"></script>
<script>
const user = getUser();

if(user) {
  document.getElementById('user-info').textContent = user.nickname || user.username;
  document.getElementById('auth-btn').textContent = '로그아웃';
  document.getElementById('auth-btn').onclick = logout;
  document.getElementById('write-btn').style.display = '';
  if(user.is_admin) {
    const adminBtn = document.createElement('button');
    adminBtn.className = 'btn btn-danger';
    adminBtn.textContent = '관리자';
    adminBtn.onclick = () => location.href = './admin.html';
    document.getElementById('header-right').appendChild(adminBtn);
  }
} else {
  document.getElementById('auth-btn').textContent = '로그인';
  document.getElementById('auth-btn').onclick = () => location.href = './login.html';
}

function toggleForm() {
  const f = document.getElementById('write-form');
  f.style.display = f.style.display === 'none' ? '' : 'none';
}

async function submitPost() {
  const title = document.getElementById('post-title').value.trim();
  const content = document.getElementById('post-content').value.trim();
  if(!title || !content) { alert('제목과 내용을 입력해주세요.'); return; }
  try {
    await supabase('POST', 'posts', {
      user_id: user.id,
      username: user.username,
      nickname: user.nickname || user.username,
      board: 'guild',
      title,
      content,
      updated_at: new Date().toISOString()
    });
    document.getElementById('post-title').value = '';
    document.getElementById('post-content').value = '';
    toggleForm();
    loadDbPosts();
  } catch(e) { alert('오류: ' + e.message); }
}

async function loadDbPosts() {
  const tbody = document.getElementById('guild-list-body');
  tbody.innerHTML = '<tr><td colspan="5" class="empty">로딩 중...</td></tr>';
  try {
    const dbPosts = await supabase('GET', 'posts', null, '?board=eq.guild&order=is_pinned.desc,updated_at.desc');
    tbody.innerHTML = '';

    if(dbPosts && dbPosts.length > 0) {
      dbPosts.forEach((p, i) => {
        const tr = document.createElement('tr');
        tr.onclick = () => location.href = `./community_view.html?id=${p.id}&back=guild`;
        tr.innerHTML = `
          <td class="num">${p.is_pinned ? '📌' : dbPosts.filter(x=>!x.is_pinned).length - dbPosts.filter(x=>!x.is_pinned).indexOf(p)}</td>
          <td><a class="guild-title-link" href="./community_view.html?id=${p.id}&back=guild">${p.title}</a></td>
          <td class="author">${p.nickname || p.username}</td>
          <td class="likes">❤ ${p.likes || 0}</td>
          <td class="date">${(p.updated_at || p.created_at).slice(0,10).replace(/-/g,'.')}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    if(guildList && guildList.length > 0) {
      const divRow = document.createElement('tr');
      divRow.innerHTML = '<td colspan="5" class="section-divider">공식 등록 길드</td>';
      tbody.appendChild(divRow);
      guildList.forEach(g => {
        const tr = document.createElement('tr');
        tr.onclick = () => location.href = `./guild_view.html?id=${g.id}`;
        tr.innerHTML = `
          <td class="num">${g.id}</td>
          <td>
            <a class="guild-title-link" href="./guild_view.html?id=${g.id}">
              <img class="guild-logo-small" src="https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/guild/${g.id}.png" alt="">
              ${g.title}
            </a>
          </td>
          <td class="author">닉스</td>
          <td class="likes">-</td>
          <td class="date">${g.date}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    if((!dbPosts || dbPosts.length === 0) && (!guildList || guildList.length === 0)) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">등록된 길드가 없습니다.</td></tr>';
    }
  } catch(e) { tbody.innerHTML = `<tr><td colspan="5" class="empty">불러오기 실패: ${e.message}</td></tr>`; }
}

loadDbPosts();
</script>
</body>
</html>
