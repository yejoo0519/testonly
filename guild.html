<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>길드</title>
<link id="theme-css" rel="stylesheet" href="./theme-dark.css">
<script src="./theme.js"></script>
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);padding:12px}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:12px;text-decoration:none;margin-bottom:16px;transition:all 0.15s}
.back-btn:hover{border-color:var(--accent);color:var(--text)}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.header h1{font-size:20px;color:var(--text2)}
.header-right{display:flex;align-items:center;gap:8px}
.user-info{font-size:12px;color:var(--accent);font-weight:600}
.btn{padding:7px 14px;border-radius:20px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s}
.btn-primary{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border)}
.btn-primary:hover{background:rgba(93,207,245,0.25)}
.btn-gray{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-gray:hover{border-color:var(--accent);color:var(--text)}
.btn-danger{background:rgba(239,83,80,0.1);color:#ef5350;border:1px solid rgba(239,83,80,0.2)}
.write-form{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
.write-form input{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border3);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;margin-bottom:8px}
.write-form input:focus{outline:none;border-color:var(--accent)}
.write-form-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}
.guild-table{width:100%;border-collapse:collapse;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.guild-table th{background:var(--bg3);padding:10px 14px;font-size:12px;font-weight:700;color:var(--accent);text-align:left;border-bottom:1px solid var(--border)}
.guild-table th.num{width:60px;text-align:center}
.guild-table th.author{width:90px;text-align:center}
.guild-table th.likes{width:60px;text-align:center}
.guild-table th.date{width:110px;text-align:center}
.guild-table td{padding:12px 14px;font-size:13px;border-bottom:1px solid var(--border2);color:var(--text)}
.guild-table td.num{text-align:center;color:var(--text4);font-size:12px}
.guild-table td.author{text-align:center;color:var(--text2);font-size:12px}
.guild-table td.likes{text-align:center;color:#f5c842;font-size:12px}
.guild-table td.date{text-align:center;color:var(--text4);font-size:12px}
.guild-table tr:last-child td{border-bottom:none}
.guild-table tr:hover td{background:var(--bg3);cursor:pointer}
.guild-title-link{color:var(--text);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:6px}
.guild-title-link:hover{color:var(--accent)}
.guild-logo-small{width:28px;height:28px;border-radius:6px;object-fit:cover;border:1px solid var(--border);background:var(--bg3);flex-shrink:0}
.empty{text-align:center;color:var(--text4);font-size:13px;padding:32px 0}
.verify-badge{font-size:12px}

/* Quill 에디터 스타일 */
.ql-toolbar{background:var(--bg3);border:1px solid var(--border3)!important;border-radius:8px 8px 0 0}
.ql-container{background:var(--bg3);border:1px solid var(--border3)!important;border-top:none!important;border-radius:0 0 8px 8px;min-height:120px;font-family:'Malgun Gothic',sans-serif;font-size:13px}
.ql-editor{color:var(--text);min-height:120px}
.ql-editor.ql-blank::before{color:var(--text4)}
.ql-snow .ql-stroke{stroke:var(--text2)!important}
.ql-snow .ql-fill{fill:var(--text2)!important}
.ql-snow .ql-picker{color:var(--text2)!important}
.ql-snow .ql-picker-options{background:var(--bg2)!important;border-color:var(--border)!important}
.ql-snow.ql-toolbar button:hover .ql-stroke{stroke:var(--accent)!important}
.ql-snow.ql-toolbar button.ql-active .ql-stroke{stroke:var(--accent)!important}
</style>
</head>
<body>
<a href="./index.html" class="back-btn">← 메인으로</a>

<div class="header">
  <h1>길드</h1>
  <div class="header-right" id="header-right">
    <span class="user-info" id="user-info"></span>
    <button class="btn btn-gray" id="auth-btn"></button>
    <button class="btn btn-primary" id="write-btn" style="display:none" onclick="location.href='./write.html?board=qna'">홍보 및 글쓰기</button>
  </div>
</div>

<div class="write-form" id="write-form" style="display:none">
  <input id="post-title" type="text" placeholder="길드명 및 제목">
  <div id="quill-editor"></div>
  <div class="write-form-btns">
    <button class="btn btn-gray" onclick="toggleForm()">취소</button>
    <button class="btn btn-primary" onclick="submitPost()">등록</button>
  </div>
</div>

<table class="guild-table">
  <thead>
    <tr>
      <th class="num">번호</th>
      <th>길드명</th>
      <th class="author">작성자</th>
      <th class="likes">추천</th>
      <th class="date">등록일</th>
    </tr>
  </thead>
  <tbody id="guild-list-body"></tbody>
</table>

<script src="./sb_config.js"></script>
<script src="./data2/guild_list.js"></script>
<script>
const user = getUser();
let quill;

if(user) {
  document.getElementById('user-info').textContent = user.nickname || user.username;
  document.getElementById('auth-btn').textContent = '로그아웃';
  document.getElementById('auth-btn').onclick = logout;
  document.getElementById('write-btn').style.display = '';
  if(user.is_admin) {
    const adminBtn = document.createElement('button');
    adminBtn.className = 'btn btn-danger';
    adminBtn.textContent = '관리자';
    adminBtn.onclick = () => location.href = './admin.html';
    document.getElementById('header-right').appendChild(adminBtn);
  }
} else {
  document.getElementById('auth-btn').textContent = '로그인';
  document.getElementById('auth-btn').onclick = () => location.href = './login.html';
}

function toggleForm() {
  const f = document.getElementById('write-form');
  const isHidden = f.style.display === 'none';
  f.style.display = isHidden ? '' : 'none';
  if(isHidden && !quill) {
    quill = new Quill('#quill-editor', {
      theme: 'snow',
      placeholder: '길드 소개, 모집 조건 등을 입력하세요',
      modules: {
        toolbar: [
          ['bold','italic','underline','strike'],
          [{'color':[]},{'background':[]}],
          [{'size':['small',false,'large','huge']}],
          ['link','image'],
          [{'list':'ordered'},{'list':'bullet'}],
          ['clean']
        ]
      }
    });
  }
}

async function submitPost() {
  const title = document.getElementById('post-title').value.trim();
  const content = quill ? quill.root.innerHTML : '';
  const textOnly = quill ? quill.getText().trim() : '';
  if(!title || !textOnly) { alert('제목과 내용을 입력해주세요.'); return; }
  try {
    await supabase('POST', 'posts', {
      user_id: user.id,
      username: user.username,
      nickname: user.nickname || user.username,
      board: 'guild',
      title,
      content,
      updated_at: new Date().toISOString()
    });
    document.getElementById('post-title').value = '';
    quill.setContents([]);
    toggleForm();
    loadDbPosts();
  } catch(e) { alert('오류: ' + e.message); }
}

async function loadDbPosts() {
  const tbody = document.getElementById('guild-list-body');
  tbody.innerHTML = '<tr><td colspan="5" class="empty">로딩 중...</td></tr>';
  try {
    const dbPosts = await supabase('GET', 'posts', null, '?board=eq.guild&order=is_pinned.desc,updated_at.desc');
    tbody.innerHTML = '';
    if(dbPosts && dbPosts.length > 0) {
      const normalPosts = dbPosts.filter(p => !p.is_pinned);
      dbPosts.forEach(p => {
        const num = p.is_pinned ? '📌' : normalPosts.length - normalPosts.indexOf(p);
        const tr = document.createElement('tr');
        tr.onclick = () => location.href = `./community_view.html?id=${p.id}&back=guild`;
        tr.innerHTML = `
          <td class="num">${num}</td>
          <td>
            <a class="guild-title-link" href="./community_view.html?id=${p.id}&back=guild">
              ${p.is_verified ? '<span class="verify-badge">✅</span>' : ''}
              ${p.title}
            </a>
          </td>
          <td class="author">${p.nickname || p.username}</td>
          <td class="likes">❤ ${p.likes || 0}</td>
          <td class="date">${(p.updated_at || p.created_at).slice(0,10).replace(/-/g,'.')}</td>
        `;
        tbody.appendChild(tr);
      });
    }
    if(guildList && guildList.length > 0) {
      guildList.forEach(g => {
        const tr = document.createElement('tr');
        tr.onclick = () => location.href = `./guild_view.html?id=${g.id}`;
        tr.innerHTML = `
          <td class="num">${g.id}</td>
          <td>
            <a class="guild-title-link" href="./guild_view.html?id=${g.id}">
              <img class="guild-logo-small" src="https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/guild/${g.id}.png" alt="">
              <span class="verify-badge">✅</span>
              ${g.title}
            </a>
          </td>
          <td class="author">닉스</td>
          <td class="likes">-</td>
          <td class="date">${g.date}</td>
        `;
        tbody.appendChild(tr);
      });
    }
    if((!dbPosts || dbPosts.length === 0) && (!guildList || guildList.length === 0)) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">등록된 길드가 없습니다.</td></tr>';
    }
  } catch(e) { tbody.innerHTML = `<tr><td colspan="5" class="empty">불러오기 실패: ${e.message}</td></tr>`; }
}

loadDbPosts();
</script>
</body>
</html>
