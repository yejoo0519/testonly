<style>


*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:#1a1a2e;color:#eee;padding:12px}
#tab-bar{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid #333;align-items:flex-end}
#site-title{display:flex;flex-direction:column;align-items:center;justify-content:center;text-decoration:none;margin-right:16px;margin-bottom:6px;border:1.5px solid #444;border-radius:20px;padding:10px 18px;transition:border-color 0.15s;flex-shrink:0}
#site-title:hover{border-color:#5dcff5}
#site-title .title-main{font-size:16px;font-weight:700;color:#aaa;line-height:1.4}
#site-title .title-sub{font-size:12px;color:#666;line-height:1.4}

.tab-btn{padding:10px 20px;font-size:13px;font-weight:500;background:none;border:none;color:#888;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;text-decoration:none;display:inline-block}
.tab-btn:hover{color:#ccc}
.tab-btn.active{color:#5dcff5;border-bottom:2px solid #5dcff5}
#tab-bar a{text-decoration:none}
@media(max-width:600px){.tab-btn{display:none}}
h1{font-size:20px;color:#aaa;margin-bottom:16px}
.section{background:#1e1e30;border:1px solid #333;border-radius:10px;padding:16px;margin-bottom:16px}
.section-title{font-size:13px;font-weight:700;color:#5dcff5;margin-bottom:12px;letter-spacing:0.05em}
.sub-tab{padding:8px 16px;font-size:12px;font-weight:600;background:none;border:none;border-bottom:2px solid transparent;color:#888;cursor:pointer;font-family:inherit;margin-bottom:-1px}
.sub-tab:hover{color:#ccc}
.sub-tab.active{color:#5dcff5;border-bottom:2px solid #5dcff5}
.boss-icon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;padding:4px 0}
.boss-icon-card{background:#252538;border:1px solid #333;border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;transition:border-color 0.15s}
.boss-icon-card:hover{border-color:#5dcff5}
.boss-icon-card.active{border-color:#5dcff5;background:rgba(93,207,245,0.08)}
.boss-icon-card img{width:80px;height:80px;object-fit:contain;border-radius:6px}
.boss-icon-name{font-size:11px;color:#aaa;margin-top:6px}
.boss-detail{margin-top:16px}
#boss-detail .section{position:relative;overflow:hidden;background:linear-gradient(135deg, #1e1e30 0%, #252538 100%);border:1px solid #333}
#boss-detail-bg{display:none}
#boss-detail-content{position:relative;z-index:1}
#boss-detail-content .boss-name{font-size:24px;font-weight:700;color:#5dcff5;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #333}
.boss-section{margin-bottom:20px}
.boss-section:last-child{margin-bottom:0}
.section-title{font-size:14px;font-weight:700;color:#5dcff5;margin-bottom:12px;padding-left:12px;border-left:3px solid #5dcff5}
.section-content{padding:0 12px}
.tip-item{padding:10px 12px;border-left:3px solid #5dcff5;background:rgba(93,207,245,0.08);border-radius:0 8px 8px 0;margin-bottom:8px;font-size:13px;color:#ddd;line-height:1.6}
.tip-item:last-child{margin-bottom:0}
.tip-icon{margin-right:8px;font-size:16px}
.desc-text{font-size:13px;color:#ddd;line-height:1.7;padding:8px 0}



</style>

<script>

const bossNames = {
  8: "블리자드",
  9: "이그나",
  10: "다크나이트",
  11: "스트라",
  12: "말덱",
  13: "헤네스",
  14: "포포모",
  15: "테디",
  16: "움브라",
  17: "엘리고스",
  18: "로키",
  19: "리치몬드",
  20: "레굴루스",
  21: "벨레드",
  22: "블루썬더",
  23: "베테라",
  24: "불나래",
  25: "옥타",
  26: "프로텍트",
  27: "리티오",
  28: "스카투스",
  29: "아카이아",
  30: "루루",
  31: "펜리르",
  32: "지바타르",
  33: "카모플라쥬",
  34: "파프니르",
  40: "엔젤주니어",
  41: "템페스트",
  42: "선셋",
  43: "알레샤"
};
const bossData = {
  8: {
    name: "블리자드",
    desc: "얼음 속성의 강력한 보스. 광역 공격이 많고 빠른 공격 속도를 가졌습니다.",
    features: [
      "❄️ 얼음 속성 광역 공격",
      "⚡ 빠른 공격 속도 (높은 DPS)",
      "🛡️ 중간 정도의 방어력"
    ],
    strategy: [
      "💧 물 속성 드래곤 추천",
      "⚙️ 속도 감소 효과 활용",
      "🎯 패턴: 광역 얼음 - 회피 후 공격"
    ]
  }
};

function switchSubTab(tab) {
  ['arha','normal','lemuria'].forEach(t => {
    document.getElementById('sub-'+t).style.display = t===tab ? '' : 'none';
    document.getElementById('sub-tab-'+t).classList.toggle('active', t===tab);
  });
  closeBossInfo();
}

function showBossInfo(num, el) {
  document.querySelectorAll('.boss-icon-card').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  const data = bossData[num];
  
  let content = `<div class="boss-name">${data ? data.name : (bossNames[num] || '보스 #'+num)}</div>`;
  
  if (data) {
    content += `
      <div class="boss-section">
        <div class="section-title">📋 특징</div>
        <div class="section-content">
          <div class="desc-text">${data.desc}</div>
          ${data.features.map(f => `<div class="tip-item">${f}</div>`).join('')}
        </div>
      </div>
      <div class="boss-section">
        <div class="section-title">⚔️ 전략</div>
        <div class="section-content">
          ${data.strategy.map(s => `<div class="tip-item">${s}</div>`).join('')}
        </div>
      </div>
    `;
  } else {
    content += `<div style="color:#666;font-size:13px;padding:10px">데이터 준비 중입니다.</div>`;
  }
  
  document.getElementById('boss-detail-content').innerHTML = content;
  document.getElementById('boss-detail').style.display = '';
  document.getElementById('boss-detail').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function closeBossInfo() {
  document.getElementById('boss-detail').style.display='none';
  document.querySelectorAll('.boss-icon-card').forEach(c=>c.classList.remove('active'));
}

</script>
