.tab-btn{padding:10px 20px;font-size:13px;font-weight:500;background:none;border:none;color:#888;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab-btn:hover{color:#ccc}
.tab-btn.active{color:#5dcff5;border-bottom:2px solid #5dcff5}

.tab-content{display:none}
.tab-content.active{display:block}

/* 초월 등급표 */

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:#1a1a2e;color:#eee;padding:12px}

/* 검색/필터 */
#top{margin-bottom:12px}
#search-bar{display:flex;gap:8px;margin-bottom:8px}
#search-bar input{flex:1;padding:16px 20px;border:1px solid #444;border-radius:8px;font-size:16px;background:#2a2a3e;color:#eee}
#search-bar input::placeholder{color:#888}
#filter-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.ftag{padding:4px 10px;border-radius:20px;font-size:11px;border:1px solid #555;cursor:pointer;background:#2a2a3e;color:#aaa}
.ftag.active{background:#4a90d9;color:#fff;border-color:#4a90d9}
#count{font-size:12px;color:#888;margin-bottom:8px}

/* 속성 패널 그리드 */
#panels{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}

/* 패널 */
.panel{border-radius:10px;overflow:hidden;border:1px solid #333}
.panel-header{display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:15px;font-weight:700}
.panel-header .elem-icon{width:36px;height:36px;border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(0,0,0,0.2)}
.panel-header .elem-icon img{width:100%;height:100%;object-fit:cover}

/* 속성별 헤더 색상 */
.panel-땅 .panel-header{background:linear-gradient(90deg,#b5651d,#d4863a)}
.panel-물 .panel-header{background:linear-gradient(90deg,#1565c0,#1e88e5)}
.panel-불 .panel-header{background:linear-gradient(90deg,#b71c1c,#e53935)}
.panel-바람 .panel-header{background:linear-gradient(90deg,#1b5e20,#388e3c)}
.panel-빛 .panel-header{background:linear-gradient(90deg,#e65100,#fb8c00)}
.panel-어둠 .panel-header{background:linear-gradient(90deg,#311b92,#5e35b1)}
.panel-황혼 .panel-header{background:linear-gradient(90deg,#880e4f,#c2185b)}
.panel-여명 .panel-header{background:linear-gradient(90deg,#4e342e,#795548)}
.panel-악몽 .panel-header{background:linear-gradient(90deg,#4a148c,#7b1fa2)}

.panel th.left{text-align:left}
.panel td{padding:5px 8px;border-bottom:0.5px solid #2a2a3e;vertical-align:middle;color:#ddd}
.panel td.center{text-align:center}
.panel tr:hover td{background:#252540}

.rank{font-size:11px;color:#888;text-align:center;width:24px}

.dragon-img{width:36px;height:36px;border-radius:6px;object-fit:cover;display:block}
.img-placeholder{width:36px;height:36px;border-radius:6px;background:#2a2a3e;border:1px dashed #444;display:flex;align-items:center;justify-content:center;color:#555;font-size:10px}

function buildFilters(){
  const fr=document.getElementById("dex-filter-row");
  fr.innerHTML="";

  const addMulti=(label,items,curSet)=>{
    const sp=document.createElement("span");
    sp.textContent=label;
    sp.style="font-size:11px;color:#888;align-self:center;margin-right:2px";
    fr.appendChild(sp);
    items.forEach(v=>{
      const b=document.createElement("button");
      b.className="ftag"+(curSet.has(v)?" active":"");
      b.textContent=v;
      b.onclick=()=>{
        if(curSet.has(v)) curSet.delete(v);
        else curSet.add(v);
        render();
      };
      fr.appendChild(b);
    });
    const sep=document.createElement("div");
    sep.style="width:100%;height:4px";
    fr.appendChild(sep);
  };
  const addSingle=(label,items,cur,setter)=>{
    const sp=document.createElement("span");
    sp.textContent=label;
    sp.style="font-size:11px;color:#888;align-self:center;margin-right:2px";
    fr.appendChild(sp);
    items.forEach(v=>{
      const b=document.createElement("button");
      b.className="ftag"+(cur===v?" active":"");
      b.textContent=v;
      b.onclick=()=>{setter(v);render();};
      fr.appendChild(b);
    });
    const sep=document.createElement("div");
    sep.style="width:100%;height:4px";
    fr.appendChild(sep);
  };

  addMulti("속성",dexElemOrder.slice(1),eFilters);
  addMulti("타입",typeOrder.slice(1),tFilters);
  addSingle("단계",stageOrder,stFilter,v=>stFilter=v);
  addSingle("레벨업",lvOrder,lvFilter,v=>lvFilter=v);
  addSingle("코드화",cdOrder,cdFilter,v=>cdFilter=v);
}

function tgClass(tg){
  if(tg==="NI"||tg==="") return "tg-ni";
  const n=parseFloat(tg);
  if(isNaN(n)) return "tg-ni";
  if(n>=7.0) return "tg-blue";
  if(n>=6.5) return "tg-gold";
  if(n>=4.5) return "tg-silver";
  if(n>=0)   return "tg-pink";
  return "tg-neg";
}

function render(){
  buildFilters();
  const q=document.getElementById("dex-q").value.trim();
  let list=dexData;

  if(eFilters.size>0) list=list.filter(d=>eFilters.has(d.e));
  if(tFilters.size>0) list=list.filter(d=>tFilters.has(d.t));
  if(stFilter==="성체만") list=list.filter(d=>d.tr===0);
  if(stFilter==="초월이상") list=list.filter(d=>d.tr===1);
  if(lvFilter==="O") list=list.filter(d=>d.lv===1);
  if(lvFilter==="X") list=list.filter(d=>d.lv===0);
  if(cdFilter!=="전체") list=list.filter(d=>d.cd===cdFilter);
  if(q) list=list.filter(d=>d.n.includes(q));

  document.getElementById("dex-count").textContent=`${list.length}마리`;

  const tbody=document.getElementById("tbody");
  tbody.innerHTML="";
  if(!list.length){
    tbody.innerHTML=`<tr><td colspan="10" style="text-align:center;padding:2rem;color:#555">검색 결과가 없습니다</td></tr>`;
    return;
  }

  list.forEach((d,i)=>{
    const tr=document.createElement("tr");
    tr.className=`e-row-${d.e}`;

    const cdCls = d.cd==="Yes"?"cd-yes":d.cd==="No"?"cd-no":"cd-cs";

    const imgUrl=dexImgMap[d.n]||'';
    const imgCell=imgUrl?`<img src="${imgUrl}" class="dragon-img" alt="${d.n}">`:`<div class="img-placeholder"></div>`;
    const dexIconUrl=dexElemIcons[d.e]||'';
    const iconCell=dexIconUrl?`<img src="${dexIconUrl}" class="dex-elem-icon" alt="${d.e}">`:`<div class="dex-elem-icon-placeholder"></div>`;

    tr.innerHTML=`
      <td class="td-mobile row1">
        <span style="color:#666;font-size:11px;min-width:20px;text-align:center">${i+1}</span>
        ${iconCell}
        ${imgCell}
        <span style="font-size:12px;font-weight:500;flex:1">${d.n}</span>
        <span class="badge-type">${d.t_kr}</span>
      </td>
      <td class="td-mobile row2">
        <div class="row2-cell"><span class="r2-label">각성</span><span class="r2-val ${d.aw?"chk-y":"chk-n"}">${d.aw?"√":"X"}</span></div>
        <div class="row2-cell"><span class="r2-label">강림</span><span class="r2-val ${d.ad?"chk-y":"chk-n"}">${d.ad?"√":"X"}</span></div>
        <div class="row2-cell"><span class="r2-label">초월</span><span class="r2-val ${d.tr?"chk-y":"chk-n"}">${d.tr?"√":"X"}</span></div>
        <div class="row2-cell"><span class="r2-label">레벨업</span><span class="r2-val ${d.lv?"chk-y":"chk-n"}">${d.lv?"√":"X"}</span></div>
        <div class="row2-cell"><span class="r2-label">코드화</span><span class="r2-val ${cdCls}">${d.cd}</span></div>
        <div class="row2-cell"><button class="detail-btn" onclick="openModal('${d.n.replace(/'/g,"\\'")}')">상세</button></div>
      </td>
      <td class="td-pc" style="color:#666;font-size:11px">${i+1}</td>
      <td class="td-pc center">${imgCell}</td>
      <td class="td-pc left" style="font-size:12px;font-weight:500">${d.n}</td>
      <td class="td-pc">${iconCell}</td>
      <td class="td-pc"><span class="badge-type">${d.t_kr}</span></td>
      <td class="td-pc ${d.aw?"chk-y":"chk-n"}">${d.aw?"√":"X"}</td>
      <td class="td-pc ${d.ad?"chk-y":"chk-n"}">${d.ad?"√":"X"}</td>
      <td class="td-pc ${d.tr?"chk-y":"chk-n"}">${d.tr?"√":"X"}</td>
      <td class="td-pc ${d.lv?"chk-y":"chk-n"}">${d.lv?"√":"X"}</td>
      <td class="td-pc ${cdCls}">${d.cd}</td>
      <td class="td-pc"><button class="detail-btn" onclick="openModal('${d.n.replace(/'/g,"\\'")}')">상세</button></td>`;
    tbody.appendChild(tr);
  });
}

render();

function openModal(name){
  document.getElementById("modal-title").textContent=name;
  document.getElementById("modal-body").textContent="Test";
  document.getElementById("modal-overlay").classList.add("open");
}
function closeModal(e){
  if(!e||e.target===document.getElementById("modal-overlay")){
    document.getElementById("modal-overlay").classList.remove("open");
  }
}
