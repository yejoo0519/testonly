<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Release Notes - Dragon Info Site made by Nix</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);padding:12px}
#tab-bar{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border);align-items:flex-end}
#site-title{display:flex;flex-direction:column;align-items:center;justify-content:center;text-decoration:none;margin-right:16px;margin-bottom:6px;border:1.5px solid var(--border3);border-radius:20px;padding:10px 18px;transition:border-color 0.15s;flex-shrink:0}
#site-title:hover{border-color:var(--accent)}
#site-title .title-main{font-size:16px;font-weight:700;color:var(--text2);line-height:1.4}
#site-title .title-sub{font-size:12px;color:var(--text4);line-height:1.4}
.tab-btn{padding:10px 20px;font-size:13px;font-weight:500;background:none;border:none;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;text-decoration:none;display:inline-block}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--accent);border-bottom:2px solid var(--accent)}
#tab-bar a{text-decoration:none}
@media(max-width:600px){.tab-btn{display:none}}

h1{font-size:20px;color:var(--text2);margin-bottom:20px}

.patch-list{display:flex;flex-direction:column;gap:16px;max-width:800px}
.patch-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px}
.patch-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.patch-version{font-size:14px;font-weight:700;color:var(--accent)}
.patch-date{font-size:12px;color:var(--text4)}
.patch-badge{font-size:10px;padding:2px 8px;border-radius:10px;margin-left:auto}
.badge-new{background:rgba(102,187,106,0.15);color:#66bb6a;border:1px solid rgba(102,187,106,0.3)}
.badge-fix{background:rgba(239,83,80,0.15);color:#ef5350;border:1px solid rgba(239,83,80,0.3)}
.badge-update{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border)}
.patch-content{font-size:13px;color:var(--text2);line-height:2}
.patch-content li{list-style:none;padding-left:12px;position:relative}
.patch-content li::before{content:"·";position:absolute;left:0;color:var(--accent)}
</style>
<link id="theme-css" rel="stylesheet" href="../theme-dark.css">
<script src="./theme.js"></script>
</head>
<body>
<style>
#lang-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border3);background:var(--bg2);color:var(--text2);font-size:12px;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:all 0.15s;flex-shrink:0;align-self:center;margin-bottom:6px}
#lang-btn:hover{border-color:var(--accent);color:var(--text)}
</style>
<div id="tab-bar">
  <a href="./index.html" id="site-title">
    <span class="title-main">Main</span>
    <span class="title-sub">made by nix</span>
  </a>
</div>

<h1>Release Notes</h1>

<div class="patch-list" id="patch-list">

  <!-- 패치노트 작성 예시 — 아래 형식으로 복사해서 추가하세요 -->
  <div class="patch-card">
    <div class="patch-header">
      <span class="patch-version">v0.0.1</span>
      <span class="patch-date">2026-04-20</span>
      <span class="patch-badge badge-new">NEW</span>
    </div>
    <ul class="patch-content">
        <li>Added multi-select for Element & Type</li>
        <li>Added Dragon Dex with image support</li>
        <li>Added SSS Ranking</li>
        <li>Added Arha Gate combos & auto-combo calculator</li>
        <li>Added Raid Info page</li>
        <li>Improved mobile & PC UI</li>
    </ul>
  </div>

</div>
</body>
</html>
