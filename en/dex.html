.tab-btn{padding:10px 20px;font-size:13px;font-weight:500;background:none;border:none;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--accent);border-bottom:2px solid var(--accent)}

.tab-content{display:none}
.tab-content.active{display:block}

#top{margin-bottom:12px}
#search-bar{display:flex;gap:8px;margin-bottom:8px}
#search-bar input{flex:1;padding:16px 20px;border:1px solid var(--border3);border-radius:8px;font-size:16px;background:var(--bg3);color:var(--text)}

.ftag{padding:4px 10px;border-radius:20px;font-size:11px;border:1px solid var(--border3);cursor:pointer;background:var(--bg3);color:var(--text2)}
.ftag.active{background:#4a90d9;color:#fff;border-color:#4a90d9}

function buildFilters(){
  const fr=document.getElementById("dex-filter-row");
  fr.innerHTML="";

  const addMulti=(label,items,curSet)=>{
    const sp=document.createElement("span");
    sp.textContent=label;
    sp.style="font-size:11px;color:#888;align-self:center;margin-right:2px";
    fr.appendChild(sp);
    items.forEach(v=>{
      const b=document.createElement("button");
      b.className="ftag"+(curSet.has(v)?" active":"");
      b.textContent=v;
      b.onclick=()=>{
        if(curSet.has(v)) curSet.delete(v);
        else curSet.add(v);
        render();
      };
      fr.appendChild(b);
    });
    const sep=document.createElement("div");
    sep.style="width:100%;height:4px";
    fr.appendChild(sep);
  };
  const addSingle=(label,items,cur,setter)=>{
    const sp=document.createElement("span");
    sp.textContent=label;
    sp.style="font-size:11px;color:#888;align-self:center;margin-right:2px";
    fr.appendChild(sp);
    items.forEach(v=>{
      const b=document.createElement("button");
      b.className="ftag"+(cur===v?" active":"");
      b.textContent=v;
      b.onclick=()=>{setter(v);render();};
      fr.appendChild(b);
    });
    const sep=document.createElement("div");
    sep.style="width:100%;height:4px";
    fr.appendChild(sep);
  };

  addMulti("Element",dexElemOrder.slice(1),eFilters);
  addMulti("Type",typeOrder.slice(1),tFilters);
  addSingle("Stage",stageOrder,stFilter,v=>stFilter=v);
  addSingle("Lv.Up",lvOrder,lvFilter,v=>lvFilter=v);
  addSingle("Codable",cdOrder,cdFilter,v=>cdFilter=v);
}

function tgClass(tg){
  if(tg==="NI"||tg==="") return "tg-ni";
  const n=parseFloat(tg);
  if(isNaN(n)) return "tg-ni";
  if(n>=7.0) return "tg-blue";
  if(n>=6.5) return "tg-gold";
  if(n>=4.5) return "tg-silver";
  if(n>=0)   return "tg-pink";
  return "tg-neg";
}

function render(){
  buildFilters();
  const q=document.getElementById("dex-q").value.trim();
  let list=dexData;

  if(eFilters.size>0) list=list.filter(d=>eFilters.has(d.e));
  if(tFilters.size>0) list=list.filter(d=>tFilters.has(d.t));
  if(stFilter==="Adult only") list=list.filter(d=>d.tr===0);
  if(stFilter==="Transcended+") list=list.filter(d=>d.tr===1);
  if(lvFilter==="O") list=list.filter(d=>d.lv===1);
  if(lvFilter==="X") list=list.filter(d=>d.lv===0);
  if(cdFilter!=="All") list=list.filter(d=>d.cd===cdFilter);
  if(q) list=list.filter(d=>d.n.includes(q));

  document.getElementById("dex-count").textContent=`${list.length} dragons`;

  const tbody=document.getElementById("tbody");
  tbody.innerHTML="";
  if(!list.length){
    tbody.innerHTML=`<tr><td colspan="10" style="text-align:center;padding:2rem;color:#555">No results found</td></tr>`;
    return;
  }

  list.forEach((d,i)=>{
    const tr=document.createElement("tr");
    tr.className=`e-row-${d.e}`;

    const cdCls = d.cd==="Yes"?"cd-yes":d.cd==="No"?"cd-no":"cd-cs";

    const imgUrl=dexImgMap[d.n]||'';
    const imgCell=imgUrl?`<img src="${imgUrl}" class="dragon-img" alt="${d.n}">`:`<div class="img-placeholder"></div>`;
    const dexIconUrl=dexElemIcons[d.e]||'';
    const iconCell=dexIconUrl?`<img src="${dexIconUrl}" class="dex-elem-icon" alt="${d.e}">`:`<div class="dex-elem-icon-placeholder"></div>`;

    tr.innerHTML=`
      <td class="td-mobile row1">
        <span style="color:#666;font-size:11px;min-width:20px;text-align:center">${i+1}</span>
        ${iconCell}
        ${imgCell}
        <span style="font-size:12px;font-weight:500;flex:1">${d.n}</span>
        <span class="badge-type">${d.t_kr}</span>
      </td>
      <td class="td-mobile row2">
        <div class="row2-cell"><span class="r2-label">Awaken</span><span class="r2-val ${d.aw?"chk-y":"chk-n"}">${d.aw?"√":"X"}</span></div>
        <div class="row2-cell"><span class="r2-label">Advent</span><span class="r2-val ${d.ad?"chk-y":"chk-n"}">${d.ad?"√":"X"}</span></div>
        <div class="row2-cell"><span class="r2-label">Trans.</span><span class="r2-val ${d.tr?"chk-y":"chk-n"}">${d.tr?"√":"X"}</span></div>
        <div class="row2-cell"><span class="r2-label">Lv.Up</span><span class="r2-val ${d.lv?"chk-y":"chk-n"}">${d.lv?"√":"X"}</span></div>
        <div class="row2-cell"><span class="r2-label">Codable</span><span class="r2-val ${cdCls}">${d.cd}</span></div>
        <div class="row2-cell"><button class="detail-btn" onclick="openModal('${d.n.replace(/'/g,"\\'")}')">Detail</button></div>
      </td>
      <td class="td-pc" style="color:#666;font-size:11px">${i+1}</td>
      <td class="td-pc center">${imgCell}</td>
      <td class="td-pc left" style="font-size:12px;font-weight:500">${d.n}</td>
      <td class="td-pc">${iconCell}</td>
      <td class="td-pc"><span class="badge-type">${d.t_kr}</span></td>
      <td class="td-pc ${d.aw?"chk-y":"chk-n"}">${d.aw?"√":"X"}</td>
      <td class="td-pc ${d.ad?"chk-y":"chk-n"}">${d.ad?"√":"X"}</td>
      <td class="td-pc ${d.tr?"chk-y":"chk-n"}">${d.tr?"√":"X"}</td>
      <td class="td-pc ${d.lv?"chk-y":"chk-n"}">${d.lv?"√":"X"}</td>
      <td class="td-pc ${cdCls}">${d.cd}</td>
      <td class="td-pc"><button class="detail-btn" onclick="openModal('${d.n.replace(/'/g,"\\'")}')">Detail</button></td>`;
    tbody.appendChild(tr);
  });
}

render();

function openModal(name){
  document.getElementById("modal-title").textContent=name;
  document.getElementById("modal-body").textContent="Test";
  document.getElementById("modal-overlay").classList.add("open");
}
function closeModal(e){
  if(!e||e.target===document.getElementById("modal-overlay")){
    document.getElementById("modal-overlay").classList.remove("open");
  }
}
