*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);padding:12px}
#site-header{display:flex;align-items:center;gap:0;margin-bottom:0}
#tab-bar{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border);align-items:flex-end}
#site-title{display:flex;flex-direction:column;align-items:center;justify-content:center;text-decoration:none;margin-right:16px;margin-bottom:6px;border:1.5px solid var(--border3);border-radius:20px;padding:10px 18px;transition:border-color 0.15s;flex-shrink:0}
#site-title:hover{border-color:var(--accent)}
#site-title .title-main{font-size:16px;font-weight:700;color:var(--text2);line-height:1.4}
#site-title .title-sub{font-size:12px;color:var(--text4);line-height:1.4}
.tab-btn{padding:10px 20px;font-size:13px;font-weight:500;background:none;border:none;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--accent);border-bottom:2px solid var(--accent)}
@media(max-width:600px){.tab-btn{display:none}}
.tab-content{display:none}
.tab-content.active{display:block}
#top{margin-bottom:12px}
#search-bar{display:flex;gap:8px;margin-bottom:8px}
#search-bar input{flex:1;padding:16px 20px;border:1px solid var(--border3);border-radius:8px;font-size:16px;background:var(--bg3);color:var(--text)}
#search-bar input::placeholder{color:var(--text4)}
#filter-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.ftag{padding:4px 10px;border-radius:20px;font-size:11px;border:1px solid var(--border3);cursor:pointer;background:var(--bg3);color:var(--text2)}
.ftag.active{background:#4a90d9;color:#fff;border-color:#4a90d9}
#count{font-size:12px;color:var(--text3);margin-bottom:8px}
#panels{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.panel{border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.panel-header{display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:15px;font-weight:700}
.panel-header .elem-icon{width:36px;height:36px;border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(0,0,0,0.2)}
.panel-header .elem-icon img{width:100%;height:100%;object-fit:cover}
.panel-Earth .panel-header{background:linear-gradient(90deg,#b5651d,#d4863a)}
.panel-Water .panel-header{background:linear-gradient(90deg,#1565c0,#1e88e5)}
.panel-Fire .panel-header{background:linear-gradient(90deg,#b71c1c,#e53935)}
.panel-Wind .panel-header{background:linear-gradient(90deg,#1b5e20,#388e3c)}
.panel-Light .panel-header{background:linear-gradient(90deg,#e65100,#fb8c00)}
.panel-Dark .panel-header{background:linear-gradient(90deg,#311b92,#5e35b1)}
.panel-Dusk .panel-header{background:linear-gradient(90deg,#880e4f,#c2185b)}
.panel-Dawn .panel-header{background:linear-gradient(90deg,#4e342e,#795548)}
.panel-Nightmare .panel-header{background:linear-gradient(90deg,#4a148c,#7b1fa2)}
.panel table{width:100%;border-collapse:collapse;font-size:12px;background:var(--bg2);min-width:0}
.panel thead tr{background:var(--bg3)}
.panel th{padding:6px 8px;text-align:center;font-weight:500;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;font-size:11px}
.panel th.left{text-align:left}
.panel td{padding:5px 8px;border-bottom:0.5px solid var(--border2);vertical-align:middle;color:var(--text)}
.panel td.center{text-align:center}
.panel tr:hover td{background:var(--bg3)}
.rank{font-size:11px;color:var(--text3);text-align:center;width:24px}
.dragon-img{width:36px;height:36px;border-radius:6px;object-fit:cover;display:block}
.img-placeholder{width:36px;height:36px;border-radius:6px;background:var(--bg3);border:1px dashed var(--border3);display:flex;align-items:center;justify-content:center;color:var(--text4);font-size:10px}
.badge-type{font-size:10px;padding:2px 5px;border-radius:6px;background:var(--bg3);color:var(--text2);white-space:nowrap}
.lv-o{color:#66bb6a;font-weight:700}
.lv-x{color:#ef5350;font-weight:700}
.t-blue{color:#5dcff5 !important;font-weight:700;font-size:13px;text-shadow:0 0 6px rgba(93,207,245,0.6)}
.t-gold{color:#f5c842 !important;font-weight:700;font-size:13px;text-shadow:0 0 6px rgba(245,200,66,0.5)}
.t-silver{color:#a8b4c0 !important;font-weight:700;font-size:13px;text-shadow:0 0 4px rgba(168,180,192,0.4)}
.t-pink{color:#c4879e !important;font-weight:700;font-size:13px;text-shadow:0 0 4px rgba(196,135,158,0.4)}
.t-neg{color:#ef5350 !important;font-weight:700;font-size:13px}

.panel-Dark tr.ex-true{background:linear-gradient(90deg,rgba(49,27,146,0.25) 0%,transparent 30%)}
.panel-Dusk tr.ex-true{background:linear-gradient(90deg,rgba(136,14,79,0.25) 0%,transparent 30%)}
.panel-Dawn tr.ex-true{background:linear-gradient(90deg,rgba(78,52,46,0.3) 0%,transparent 30%)}
.panel-Nightmare tr.ex-true{background:linear-gradient(90deg,rgba(74,20,140,0.25) 0%,transparent 30%)}

.td-pc{display:table-cell}

const tierElemOrder=["Earth","Water","Fire","Wind","Light","Dark","Dusk","Dawn","Nightmare"];
const tierTypes=["All","ATK-DEF","ATK","DEF","HP-ATK","HP-DEF","HP"];
let eTFilters=new Set(); let tTFilters=new Set();

function buildFilters(){
  const fr=document.getElementById("filter-row");
  fr.innerHTML="";

  
  const eLabel=document.createElement("span");
  eLabel.textContent="Element";
  eLabel.style="font-size:11px;color:#888;align-self:center;margin-right:2px";
  fr.appendChild(eLabel);
  ["Earth","Water","Fire","Wind","Light","Dark","Dusk","Dawn","Nightmare"].forEach(e=>{
    const b=document.createElement("button");
    b.className="ftag"+(eTFilters.has(e)?" active":"");
    b.textContent=e;
    b.onclick=()=>{
      if(eTFilters.has(e)) eTFilters.delete(e);
      else eTFilters.add(e);
      render();
    };
    fr.appendChild(b);
  });

  
  const sep=document.createElement("div");
  sep.style="width:100%;height:6px";
  fr.appendChild(sep);

  
  const tLabel=document.createElement("span");
  tLabel.textContent="Type";
  tLabel.style="font-size:11px;color:#888;align-self:center;margin-right:2px";
  fr.appendChild(tLabel);
  ["HP","ATK","DEF","HP-ATK","HP-DEF","ATK-DEF"].forEach(t=>{
    const b=document.createElement("button");
    b.className="ftag"+(tTFilters.has(t)?" active":"");
    b.textContent=t;
    b.onclick=()=>{
      if(tTFilters.has(t)) tTFilters.delete(t);
      else tTFilters.add(t);
      render();
    };
    fr.appendChild(b);
  });
}

function render(){
  buildFilters();
  const q=document.getElementById("q").value.trim();
  const panels=document.getElementById("panels");
  panels.innerHTML="";

  let total=0;
  const filteredElems=eTFilters.size>0?tierElemOrder.filter(e=>eTFilters.has(e)):tierElemOrder;
  filteredElems.forEach(elem=>{
    let list=data.filter(d=>d.e===elem);
    if(tTFilters.size>0) list=list.filter(d=>tTFilters.has(d.t));
    if(q) list=list.filter(d=>d.n.includes(q));
    if(!list.length) return;
    list=list.slice().sort((a,b)=>b.g-a.g);
    total+=list.length;

    const cfg=elemConfig[elem];
    const panel=document.createElement("div");
    panel.className=`panel panel-${elem}`;

    
    const iconHtml=cfg.icon
      ?`<div class="elem-icon"><img src="${cfg.icon}" alt="${elem}"></div>`
      :`<div class="elem-icon" style="font-size:18px;background:rgba(0,0,0,0.25);width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center">${elem[0]}</div>`;

    let rows="";
    list.forEach((d,i)=>{
      const imgMap={"Earth":"img1","Water":"img2","Fire":"img3","Wind":"img4","Light":"img5","Dark":"img6","Dusk":"img7","Dawn":"img8","Nightmare":"img9"};
      const imgKey=imgMap[d.e]||"img1";
      const imgSrc=d[imgKey]||"";
      const imgCell=imgSrc
        ?`<img src="${imgSrc}" class="dragon-img" alt="${d.n}">`
        :`<div class="img-placeholder"></div>`;
      rows+=`<tr class="${d.ex?'ex-true':'ex-false'}">`+`
        <td class="center rank">${i+1}</td>
        <td class="center" style="width:42px">${imgCell}</td>
        <td class="center"><span class="badge-type">${d.t}</span></td>
        <td style="font-size:12px;font-weight:500">${d.n}</td>
        <td class="center ${d.lv==='O'?'lv-o':'lv-x'}">${d.lv}</td>
        <td class="center ${tierClass(d.g)}">${Number.isInteger(d.g)?d.g.toFixed(1):d.g}</td>
      </tr>`;
    });

    panel.innerHTML=`
      <div class="panel-header">
        ${iconHtml}
        <span>${cfg.label}</span>
      </div>
      <table>
        <thead><tr>
          <th style="width:24px"></th>
          <th style="width:42px"></th>
          <th class="center">Type</th>
          <th class="left">Dragon</th>
          <th class="center">Lv.Up</th>
          <th class="center">Grade</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    panels.appendChild(panel);
  });

  document.getElementById("count").textContent=`${total} dragons`;
}

render();
</script>
