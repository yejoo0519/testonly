#site-title .title-sub{font-size:12px;color:#666;line-height:1.4}

.tab-btn{padding:10px 20px;font-size:13px;font-weight:500;background:none;border:none;color:#888;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab-btn:hover{color:#ccc}
.tab-btn.active{color:#5dcff5;border-bottom:2px solid #5dcff5}
@media(max-width:600px){.tab-btn{display:none}}
.tab-content{display:none}
.tab-content.active{display:block}

/* 초월 등급표 */

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:#1a1a2e;color:#eee;padding:12px}

/* 검색/필터 */
#top{margin-bottom:12px}
#search-bar{display:flex;gap:8px;margin-bottom:8px}
#search-bar input{flex:1;padding:16px 20px;border:1px solid #444;border-radius:8px;font-size:16px;background:#2a2a3e;color:#eee}
#search-bar input::placeholder{color:#888}
#filter-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.ftag{padding:4px 10px;border-radius:20px;font-size:11px;border:1px solid #555;cursor:pointer;background:#2a2a3e;color:#aaa}
.ftag.active{background:#4a90d9;color:#fff;border-color:#4a90d9}
#count{font-size:12px;color:#888;margin-bottom:8px}

/* 속성 패널 그리드 */
#panels{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}

/* 패널 */
.panel{border-radius:10px;overflow:hidden;border:1px solid #333}
.panel-header{display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:15px;font-weight:700}
.panel-header .elem-icon{width:36px;height:36px;border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(0,0,0,0.2)}
.panel-header .elem-icon img{width:100%;height:100%;object-fit:cover}

/* 속성별 헤더 색상 */
.panel-땅 .panel-header{background:linear-gradient(90deg,#b5651d,#d4863a)}
.panel-물 .panel-header{background:linear-gradient(90deg,#1565c0,#1e88e5)}
.panel-불 .panel-header{background:linear-gradient(90deg,#b71c1c,#e53935)}
.panel-바람 .panel-header{background:linear-gradient(90deg,#1b5e20,#388e3c)}
.panel-빛 .panel-header{background:linear-gradient(90deg,#e65100,#fb8c00)}
.panel-어둠 .panel-header{background:linear-gradient(90deg,#311b92,#5e35b1)}
.panel-황혼 .panel-header{background:linear-gradient(90deg,#880e4f,#c2185b)}
.panel-여명 .panel-header{background:linear-gradient(90deg,#4e342e,#795548)}
.panel-악몽 .panel-header{background:linear-gradient(90deg,#4a148c,#7b1fa2)}

/* 테이블 */
.panel table{width:100%;border-collapse:collapse;font-size:12px;background:#1e1e30;min-width:0}
.panel thead tr{background:#252538}
.panel th{padding:6px 8px;text-align:center;font-weight:500;color:#aaa;border-bottom:1px solid #333;white-space:nowrap;font-size:11px}
.panel th.left{text-align:left}
.panel td{padding:5px 8px;border-bottom:0.5px solid #2a2a3e;vertical-align:middle;color:#ddd}
.panel td.center{text-align:center}
.panel tr:hover td{background:#252540}

/* 순위 */
.rank{font-size:11px;color:#888;text-align:center;width:24px}

/* 드래곤 이미지 */
.dragon-img{width:36px;height:36px;border-radius:6px;object-fit:cover;display:block}
.img-placeholder{width:36px;height:36px;border-radius:6px;background:#2a2a3e;border:1px dashed #444;display:flex;align-items:center;justify-content:center;color:#555;font-size:10px}

/* 타입 뱃지 */
.badge-type{font-size:10px;padding:2px 5px;border-radius:6px;background:#2e2e4a;color:#aaa;white-space:nowrap}

/* 레벨업 */
.lv-o{color:#66bb6a;font-weight:700}
.lv-x{color:#ef5350;font-weight:700}

/* 등급 색상 */

let sssLvFilter=45; let sssElemFilters=new Set();

function setSSSLv(lv){
  sssLvFilter=lv;
  document.querySelectorAll('[id^="sss-lv-"]').forEach(b=>b.classList.remove('active'));
  document.getElementById('sss-lv-'+lv).classList.add('active');
  render();
}
function setSSSElem(e){
  if(sssElemFilters.has(e)) sssElemFilters.delete(e);
  else sssElemFilters.add(e);
  document.querySelectorAll('[id^="sss-e-"]').forEach(b=>{
    const id=b.id.replace('sss-e-','').replace('all','전체');
    b.classList.toggle('active', sssElemFilters.has(id) || (id==='전체' && sssElemFilters.size===0));
  });
  render();
}

  "미스트 드래곤":"https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/NI/image178.png"
};

const skillIcons = {
  boom: 'https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/icon/boom.png',
  def: 'https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/icon/DEF.png'
};
const sssElemIcons={
  "땅":"https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/icon/11.png",
  "물":"https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/icon/12.png",
  "불":"https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/icon/13.png",
  "바람":"https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/icon/14.png",
  "빛":"https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/icon/84.png",
  "어둠":"https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/icon/87.png",
  "황혼":"https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/icon/487.png",
  "여명":"https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/icon/486.png",
  "악몽":"https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/icon/488.png",
};
function render(){
  let list=sssData;
  list=list.filter(d=>d.lv===sssLvFilter);
  if(sssElemFilters.size>0) list=list.filter(d=>sssElemFilters.has(d.elem));
  list=list.slice().sort((a,b)=>a.rank-b.rank||b.eval-a.eval);

  document.getElementById('sss-count').textContent=`${list.length}마리`;
  const tbody=document.getElementById('sss-tbody');
  tbody.innerHTML='';
  if(!list.length){
    tbody.innerHTML='<tr><td colspan="10" style="text-align:center;padding:2rem;color:#555">결과가 없습니다</td></tr>';
    return;
  }
  list.forEach(d=>{
    const [bg,tx]=(elemColors[d.elem]||['#2a2a3e','#aaa']);
    const tr=document.createElement('tr');
    tr.className=`e-row-${d.elem}`;
    const sssIconUrl=sssElemIcons[d.elem]||'';
    const sssIconCell=sssIconUrl?`<img src="${sssIconUrl}" class="dex-elem-icon" alt="${d.elem}">`:`<div class="dex-elem-icon-placeholder"></div>`;
    const sssImgCell=sssImgMap[d.kor]?`<img src="${sssImgMap[d.kor]}" class="dragon-img" alt="${d.kor}">`:`<div class="img-placeholder"></div>`;
    tr.innerHTML=`
      <td class="td-mobile row1">
        <span style="font-weight:700;color:#5dcff5;min-width:24px;text-align:center">${d.rank}</span>
        ${sssImgCell}
        <span style="font-size:12px;font-weight:500;flex:1">${d.kor}</span>${d.skill ? `<img src="${skillIcons[d.skill]}" title="${d.skill==='boom' ? '폭스' : '방확'}" style="width:18px;height:18px;margin-left:5px;vertical-align:middle;opacity:0.9">` : ""}
        ${sssIconCell}
        <span style="font-size:11px;color:#aaa">Lv.${d.lv}</span>
      </td>
      <td class="td-mobile row2">
        <div class="row2-cell"><span class="r2-label">HP</span><span class="r2-val" style="color:#66bb6a">${d.hp}</span></div>
        <div class="row2-cell"><span class="r2-label">ATK</span><span class="r2-val" style="color:#ef5350">${d.atk}</span></div>
        <div class="row2-cell"><span class="r2-label">DEF</span><span class="r2-val" style="color:#5dcff5">${d.def}</span></div>
        <div class="row2-cell"><span class="r2-label">Eval</span><span class="r2-val" style="color:#f5c842;font-weight:700">${d.eval}</span></div>
        <div class="row2-cell"><span class="r2-label">기본</span><span class="r2-val" style="color:#aaa">${d.base}</span></div>
        <div class="row2-cell"><span class="r2-label">성장</span><span class="r2-val" style="color:#aaa">${d.grow}</span></div>
      </td>
      <td class="td-pc center" style="font-weight:700;color:#5dcff5">${d.rank}</td>
      <td class="td-pc center">${sssImgCell}</td>
      <td class="td-pc left" style="font-size:12px;font-weight:500;white-space:nowrap">${d.kor}${d.skill ? `<img src="${skillIcons[d.skill]}" title="${d.skill==='boom' ? '폭스' : '방확'}" style="width:18px;height:18px;margin-left:5px;vertical-align:middle;opacity:0.9">` : ""}</td>
      <td class="td-pc">${sssIconCell}</td>
      <td class="td-pc" style="font-size:11px;color:#aaa">Lv.${d.lv}</td>
      <td class="td-pc" style="color:#66bb6a;font-size:11px">${d.hp}</td>
      <td class="td-pc" style="color:#ef5350;font-size:11px">${d.atk}</td>
      <td class="td-pc" style="color:#5dcff5;font-size:11px">${d.def}</td>
      <td class="td-pc" style="color:#f5c842;font-weight:700">${d.eval}</td>
      <td class="td-pc" style="font-size:11px;color:#aaa">${d.base}</td>
      <td class="td-pc" style="font-size:11px;color:#aaa">${d.grow}</td>`;
    tbody.appendChild(tr);
  });
}
render();
</script>
</body>
</html>
