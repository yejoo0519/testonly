<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<script src="./dragon-data.js"></script>
<style>
:root{--bg:#0d0f1a;--sf:#141828;--sf2:#1c2240;--bd:#252d50;--gold:#e8b84b;--gold2:#c49a30;--blue:#60a5fa;--red:#f87171;--green:#4ade80;--purple:#c084fc;--orange:#fb923c;--text:#dde2f5;--dim:#7a87b0;--dimmer:#3a4570;--hpc:#fbbf24;--atc:#f87171;--dfc:#60a5fa}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nanum Gothic',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.hd{display:flex;align-items:center;gap:14px;padding:12px 20px;background:var(--sf);border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:100}
.hd-icon{font-size:26px}.hd-t{font-size:15px;font-weight:800;color:var(--gold)}.hd-s{font-size:11px;color:var(--dim);margin-top:2px}
.tabs{display:flex;background:var(--sf);border-bottom:1px solid var(--bd);position:sticky;top:50px;z-index:99}
.tab-btn{flex:1;padding:12px 20px;background:none;border:none;border-bottom:3px solid transparent;color:var(--dim);font-family:'Nanum Gothic',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tc{display:none}.tc.active{display:block}
.ti{max-width:100%;padding:14px 24px}.ti-sim{max-width:1200px;margin:0 auto;padding:14px 24px}
.ti-dragon{max-width:1240px;margin:0 auto;padding:14px 24px}
.sec{background:var(--sf);border:1px solid var(--bd);border-radius:8px;margin-bottom:14px;overflow:hidden}
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;background:var(--sf2);border-bottom:1px solid var(--bd);font-size:11px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.5px}
.sec-bd{padding:14px 16px}
select,input[type=number],input[type=text]{background:var(--sf2);border:1px solid var(--bd);color:var(--text);padding:5px 9px;border-radius:5px;font-family:'Nanum Gothic',sans-serif;font-size:13px}

.dragon-type-field{color:#fff}
.acc-srch{width:100%;padding:8px 12px;margin-bottom:10px;background:var(--sf2);border:1px solid var(--bd);border-radius:5px;color:var(--text);font-family:'Nanum Gothic',sans-serif;font-size:13px}
.acc-srch:focus{outline:none;border-color:var(--gold)}
.acc-list{max-height:260px;overflow-y:auto;padding-right:2px}
.acc-row{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:4px}
.acc-row:hover{background:var(--sf2)}
.acc-row input[type=checkbox]{accent-color:var(--gold);cursor:pointer;flex-shrink:0}
.acc-row label{flex:1;cursor:pointer;font-size:13px}
.acc-st{font-size:11px;min-width:68px}
.acc-card{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:8px 12px;margin-bottom:8px}
.acc-card-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.acc-search-wrap{position:relative;flex:1;min-width:140px}

.acc-search-input:focus{outline:none;border-color:var(--gold)}

.acc-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--sf2);border:1px solid var(--gold);border-radius:5px;max-height:200px;overflow-y:auto;z-index:200;margin-top:2px;display:none}
.acc-dropdown.open{display:block}
.acc-drop-item{padding:6px 10px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;color:var(--text);font-family:'Nanum Gothic',sans-serif}
.acc-drop-item:hover{background:rgba(232,184,75,.12)}

.acc-drop-name{flex:1}
.acc-preset-row{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:6px;padding:10px 16px;border-bottom:1px solid var(--bd);background:rgba(255,255,255,.015)}

.gem-grid{display:grid;grid-template-columns:42px repeat(3,1fr);gap:6px;align-items:center}

.gem-grid input[type=number]::-webkit-outer-spin-button,.gem-grid input[type=number]::-webkit-inner-spin-button{-webkit-appearance:auto!important;margin:0}
.gem-grid input[type=number]{appearance:auto;-moz-appearance:number-input!important}
.pcard{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:12px;margin-bottom:10px}
.pcard-hd{display:flex;align-items:center;gap:10px;margin-bottom:10px}

.sp-top{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}

.coll-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.coll-g label{display:block;font-size:12px;color:var(--dim);margin-bottom:4px}
.coll-g input{width:100%;text-align:center}
.btn-white{background:none;border:1px solid #fff;color:#fff;padding:6px 13px;border-radius:5px;cursor:pointer;font-family:'Nanum Gothic',sans-serif;font-size:13px;font-weight:700}

.btn-gold{background:none;border:1px solid var(--gold);color:var(--gold);padding:6px 13px;border-radius:5px;cursor:pointer;font-family:'Nanum Gothic',sans-serif;font-size:13px;font-weight:700}
.btn-gold:hover{background:rgba(232,184,75,.1)}

.cfg-lbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:7px}
.btn-grp{display:flex;gap:4px}
.btn-grp button{flex:1;padding:8px 4px;background:var(--sf2);border:1px solid var(--bd);border-radius:4px;color:var(--dim);cursor:pointer;font-family:'Nanum Gothic',sans-serif;font-size:13px;font-weight:700;transition:all .15s}
.btn-grp button.active{background:rgba(232,184,75,.12);border-color:var(--gold);color:var(--gold)}
.radio-opts label{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13px;margin-bottom:5px}

.buff-setting-panel{border:1px solid var(--bd);border-radius:6px;overflow:hidden;background:var(--sf)}
.buff-setting-title{background:var(--sf2);border-bottom:1px solid var(--bd);padding:8px;text-align:center;color:var(--gold);font-size:13px;font-weight:800}
.buff-setting-body{display:grid;grid-template-columns:1fr 1fr}
.buff-setting-cell{min-height:74px;padding:8px;border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px}
.buff-setting-cell:nth-child(2n){border-right:none}
.buff-setting-cell:nth-last-child(-n+2){border-bottom:none}
.buff-setting-lbl{font-size:11px;color:#fff;font-weight:800}
.buff-setting-cell select{width:100%;max-width:150px;text-align:center}
.buff-attr-icon{width:48px;height:48px;object-fit:contain}
.btn-sim{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold2),var(--gold));border:none;border-radius:8px;color:#0a0c18;font-family:'Nanum Gothic',sans-serif;font-size:16px;font-weight:800;cursor:pointer;margin:12px 0;letter-spacing:-.5px;transition:opacity .15s,transform .1s}
.btn-sim:hover{opacity:.92}.btn-sim:active{transform:scale(.99)}.btn-sim:disabled{opacity:.5;cursor:not-allowed}
.res-wrap{overflow-x:auto}
table.rtbl{width:100%;border-collapse:collapse;min-width:640px}
.rtbl th{background:var(--sf2);padding:9px 11px;text-align:left;font-size:11px;color:var(--dim);border-bottom:1px solid var(--bd);white-space:nowrap}
.rtbl td{padding:10px 11px;border-bottom:1px solid var(--bd);font-size:13px;vertical-align:middle}
.rtbl tr:last-child td{border-bottom:none}
.rtbl tbody tr:hover td{background:rgba(255,255,255,.015)}
.medal{font-size:20px}.rank-n{font-weight:800;color:var(--dim)}
.dtype-b{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:800;border:1px solid}
.res-attr-type{display:flex;align-items:center;gap:7px;white-space:nowrap}
.res-attr-icon{width:28px;height:28px;object-fit:contain;flex-shrink:0}
.bv-cell{font-family:'Courier New',monospace;font-size:14px;font-weight:800;color:var(--gold);white-space:nowrap}
.st-cell{font-family:'Courier New',monospace;font-size:12px;white-space:nowrap}
.gem-tags{display:flex;flex-wrap:wrap;gap:3px}
.gem-tag{padding:2px 6px;border-radius:3px;font-size:11px;font-weight:700;background:rgba(255,255,255,.07)}
.enc-b{display:inline-block;padding:1px 7px;border-radius:3px;font-size:11px;font-weight:700;border:1px solid var(--green);color:var(--green);background:rgba(74,222,128,.1)}
.enc-none{border-color:var(--dimmer);color:var(--dimmer);background:none}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{appearance:textfield;-moz-appearance:textfield}
.spec-layout{display:flex;flex-direction:column;gap:36px;align-items:stretch}
.spec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:start}
.spec-col{display:flex;flex-direction:column;gap:14px}
.spec-col .sec{margin-bottom:0}
.dragon-cats{display:flex;flex-direction:column;gap:8px}
.dragon-cat{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;overflow:hidden}
.dragon-cat summary{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;color:var(--text);font-weight:400;cursor:pointer;list-style:none}
.dragon-cat summary::-webkit-details-marker{display:none}
.dragon-cat summary::after{content:'+';color:var(--gold);font-size:16px;line-height:1}
.dragon-cat[open] summary{border-bottom:1px solid var(--bd);color:var(--gold)}
.dragon-cat[open] summary::after{content:'-'}
.dragon-cat-title{display:flex;align-items:center;gap:8px}
.dragon-cat-icon{width:24px;height:24px;object-fit:contain;flex-shrink:0}
.dragon-cat-count{color:var(--dim);font-size:12px}
.dragon-cat-body{min-height:48px;padding:12px 14px;color:var(--dim);font-size:13px}
.dragon-cat-actions{display:none;margin-left:auto;margin-right:12px;gap:6px}
.dragon-cat[open] .dragon-cat-actions{display:flex}
.dragon-card{background:var(--sf);border:1px solid var(--bd);border-radius:6px;padding:12px;margin-bottom:10px}
.dragon-card:last-child{margin-bottom:0}
.dragon-card-hd{display:grid;grid-template-columns:minmax(0,1.25fr) auto minmax(0,.85fr) minmax(0,.85fr) minmax(0,.55fr) auto;gap:8px;align-items:center;margin-bottom:10px}
.dragon-name-cell{display:flex;align-items:center;gap:8px;min-width:0}
.dragon-card-no{color:#fff;font-size:12px;font-weight:800;min-width:18px;text-align:right}
.dragon-name-input{width:100%;min-width:0}
.dragon-view-toggle{display:flex;gap:6px;margin-bottom:12px;}
.dragon-view-btn{padding:5px 14px;border-radius:5px;border:1px solid var(--bd);background:var(--sf2);color:var(--dim);font-size:12px;cursor:pointer;}
.dragon-view-btn.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700;}
#dragon-gallery{display:none;}
#dragon-gallery.active{display:block;}
#dragon-form-view.hidden{display:none;}
.gallery-section{margin-bottom:16px;}
.gallery-section-title{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--gold);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bd);}
.gallery-grid{display:flex;flex-wrap:wrap;gap:10px;}
.gallery-card{width:60px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px;border-radius:8px;border:1px solid var(--bd);background:var(--sf2);transition:border-color .15s,background .15s;}
.gallery-card:hover{border-color:var(--gold);background:var(--sf);}
.gallery-card img{width:44px;height:44px;object-fit:contain;border-radius:6px;}
.gallery-card .gc-name{font-size:9px;color:var(--dim);text-align:center;word-break:keep-all;line-height:1.3;}
.gallery-panel-wrap{position:relative;}
.gallery-panel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--sf2);border:1px solid var(--gold);border-radius:12px;padding:20px;z-index:500;min-width:280px;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.gallery-panel.open{display:block;}
.gallery-panel-overlay{display:none;position:fixed;inset:0;z-index:499;background:rgba(0,0,0,.4);}
.gallery-panel-overlay.open{display:block;}
.gp-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.gp-img{width:56px;height:56px;object-fit:contain;border-radius:8px;background:var(--sf);border:1px solid var(--bd);}
.gp-title{flex:1;}
.gp-name{font-size:15px;font-weight:700;color:var(--text);}
.gp-type{font-size:12px;color:var(--dim);margin-top:2px;}
.gp-close{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:0 4px;}
.gp-close:hover{color:var(--text);}
.gp-rows{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px;}
.gp-row{background:var(--sf);border-radius:6px;padding:6px 10px;}
.gp-label{font-size:10px;color:var(--dim);margin-bottom:2px;}
.gp-val{font-size:12px;font-weight:700;color:var(--text);}
.gp-opts{margin-bottom:14px;}
.gp-opt-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--bd);font-size:12px;}
.gp-opt-row:last-child{border-bottom:none;}
.gp-opt-label{color:var(--dim);}
.gp-opt-val{color:var(--green);font-weight:700;}
.gp-edit-btn{width:100%;padding:8px;border-radius:6px;background:var(--gold);border:none;color:#000;font-weight:700;font-size:13px;cursor:pointer;}
.gp-edit-btn:hover{opacity:.85;}

.dragon-img-icon{width:32px;height:32px;object-fit:contain;border-radius:4px;flex-shrink:0;border:1px solid var(--bd);background:var(--sf2);}
.dragon-img-placeholder{width:32px;height:32px;border-radius:4px;flex-shrink:0;border:1px solid var(--bd);background:var(--sf2);}
.dragon-name-wrap{position:relative;flex:1;min-width:0;}
.dragon-drop{position:fixed;background:var(--sf2);border:1px solid var(--gold);border-radius:4px;z-index:1000;max-height:220px;overflow-y:auto;display:none;}
.dragon-drop.open{display:block;}
.dragon-drop .acc-drop-item{padding:5px 10px;cursor:pointer;display:flex;align-items:center;font-size:13px;}
.dragon-drop .acc-drop-item:hover{background:var(--sf);}
.dragon-dupe-check{display:flex;align-items:center;gap:5px;color:#fff;font-size:12px;white-space:nowrap;margin-left:10px}
.dragon-dupe-check input{accent-color:var(--gold)}
.dragon-card-hd select,.dragon-card-hd .dragon-type-field{width:100%;min-width:0}
.dragon-reset-btn{justify-self:end;width:40px;height:30px;padding:0;font-size:13px;line-height:1}
.dragon-delete-btn{height:30px;white-space:nowrap}
.dragon-preset-row{display:grid;grid-template-columns:repeat(5,minmax(0,1fr)) auto;gap:6px;align-items:center;margin-bottom:10px}
.dragon-preset-row .sp-preset-btn{min-height:30px;padding:4px 6px}
.dragon-preset-row .sp-preset-name{font-size:12px;font-weight:400}
.dragon-preset-row .sp-preset-desc{font-size:12px;margin-left:4px}
.dragon-spirit-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:10px}
.dragon-opt-card{display:grid;grid-template-columns:24px minmax(0,1fr) minmax(0,1fr) 48px;gap:8px;padding:6px 10px}
.dragon-opt-card select{width:100%;min-width:0}
.dragon-opt-card .sp-onum{align-self:center;white-space:nowrap}
.dragon-opt-card .sp-oval{align-self:center;color:var(--green);font-weight:800}
.dragon-bonus-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.dragon-bonus-fields{display:grid;grid-template-columns:56px minmax(0,1fr);gap:8px;align-items:center;min-width:220px}

.dragon-bonus-fields label{color:var(--dim);font-size:12px;text-align:center}
@media(max-width:1100px) and (min-width:701px){.spec-grid{grid-template-columns:1fr 1fr}}
@media(max-width:700px){.spec-grid{grid-template-columns:1fr}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
@media(max-width:580px){.sim-cfg{grid-template-columns:1fr}.buff-setting-grid{grid-template-columns:1fr}.sp-top{grid-template-columns:1fr}.sp-preset-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.sp-preset-btn{white-space:normal}}
.res-tab-btn{padding:9px 18px;background:none;border:none;border-bottom:3px solid transparent;color:var(--dim);font-family:'Nanum Gothic',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.res-tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
</style>
</head>

<div class="hd">

  const attrIcon={'땅':'https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/icon/11.png','물':'https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/icon/12.png','불':'https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/icon/13.png','바람':'https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/icon/14.png','빛':'https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/icon/84.png','어둠':'https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/icon/87.png','여명':'https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/icon/486.png','황혼':'https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/icon/487.png','악몽':'https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/icon/488.png'};
  let html2='';
  DRAGON_CATS.forEach(function(cat){
    const cards=S.dragonCards[cat]||[];
    const named=cards.filter(function(c){return c.name;});
    if(!named.length)return;
    const iconHtml=named.map(function(c,i){
      const ci=cards.indexOf(c);
      const url=getDragonImgUrl(c.name);
      const imgTag=url?('<img src="'+url+'" onerror="this.style.visibility=\'hidden\'" style="width:44px;height:44px;object-fit:contain;border-radius:6px;">'):('<div style="width:44px;height:44px;background:var(--sf);border-radius:6px;"></div>');
      const safecat=cat.replace(/'/g,"\\'");
      return '<div class="gallery-card" onclick="openGalleryPanel(\''+safecat+'\','+ci+')" title="'+c.name+'">'
        +imgTag
        +'<span class="gc-name">'+c.name+'</span>'
        +'</div>';
    }).join('');
    html2+='<div class="gallery-section">'
      +'<div class="gallery-section-title"><img src="'+attrIcon[cat]+'" style="width:18px;height:18px;object-fit:contain;">'+cat+' ('+named.length+'마리)</div>'
      +'<div class="gallery-grid">'+iconHtml+'</div>'
      +'</div>';
  });
  el.innerHTML=html2||'<div style="color:var(--dim);text-align:center;padding:40px;font-size:13px;">입력된 용이 없습니다</div>';
}

function openGalleryPanel(cat,ci){
  normalizeDragonCards();
  const card=S.dragonCards[cat][ci];
  if(!card)return;
  _gpCat=cat;_gpCi=ci;
  const url=getDragonImgUrl(card.name);
  const imgEl=document.getElementById('gp-img');
  if(url){imgEl.src=url;imgEl.style.display='';}
  else imgEl.style.display='none';
  document.getElementById('gp-name').textContent=card.name||'(이름 없음)';
  document.getElementById('gp-type').textContent=(card.dtype||'')+(card.dtype&&card.growth?' · ':'')+((card.growth||''));
  const gradeLabel=card.growth==='강림'||card.growth==='진각'?'7.0':card.grade||'-';
  document.getElementById('gp-rows').innerHTML=
    '<div class="gp-row"><div class="gp-label">속성</div><div class="gp-val">'+cat+'</div></div>'
    +'<div class="gp-row"><div class="gp-label">타입</div><div class="gp-val">'+(card.dtype||'-')+'</div></div>'
    +'<div class="gp-row"><div class="gp-label">강림 단계</div><div class="gp-val">'+(card.growth||'-')+'</div></div>'
    +'<div class="gp-row"><div class="gp-label">등급</div><div class="gp-val">'+gradeLabel+'</div></div>';
  const opts=card.opts||[];
  const bonusLabel={'hp':'체력 (+40)','atk':'공격 (+10)','def':'방어 (+10)'};
  const bonusRow=card.bonus?'<div class="gp-opt-row"><span class="gp-opt-label">부가옵</span><span class="gp-opt-val">'+bonusLabel[card.bonus]+'</span></div>':'';
  document.getElementById('gp-opts').innerHTML=opts.map(function(o,i){
    if(!o.stat||o.stat==='없음')return '';
    const v=fmtDragonSpVal(i+1,o.stat,o.type);
    return '<div class="gp-opt-row"><span class="gp-opt-label">'+(i+1)+'옵 '+o.stat+'</span><span class="gp-opt-val">'+v+'</span></div>';
  }).join('')+bonusRow;
  document.getElementById('gp-overlay').classList.add('open');
  document.getElementById('gallery-panel').classList.add('open');
}

function closeGalleryPanel(){
  document.getElementById('gp-overlay').classList.remove('open');
  document.getElementById('gallery-panel').classList.remove('open');
  _gpCat=null;_gpCi=null;
}

function goEditDragon(){
  if(!_gpCat||_gpCi===null)return;
  closeGalleryPanel();
  switchDragonView('form');
  // 해당 속성 details 열기
  const details=document.querySelector('[data-dragon-list="'+_gpCat+'"]');
  if(details){
    const det=details.closest('details');
    if(det)det.open=true;
  }
  // 해당 카드로 스크롤
  setTimeout(function(){
    const cards=document.querySelectorAll('[data-dragon-list="'+_gpCat+'"] .dragon-card');
    if(cards[_gpCi]){
      cards[_gpCi].scrollIntoView({behavior:'smooth',block:'center'});
      cards[_gpCi].style.outline='2px solid var(--gold)';
      setTimeout(function(){cards[_gpCi].style.outline='';},1500);
    }
  },100);
}

function getAccNum(name){
  const m=name.match(/(\d+)\s*$/);
  return m?parseInt(m[1]):0;
}
function getAccType(name){
  for(let i=0;i<ACC_TYPE_ORDER.length;i++){
    const type=ACC_TYPE_ORDER[i];
    if(name.startsWith(type)||name.includes(`(${type})`))return i;
  }
  return 99;
}
function sortAccCards(){
  S.accCards=S.accCards.map((c,i)=>({...c,_idx:i}));
  S.accCards.sort((a,b)=>{
    const numA=getAccNum(a.name||''),numB=getAccNum(b.name||'');
    if(numB!==numA)return numB-numA;
    const typeA=getAccType(a.name||''),typeB=getAccType(b.name||'');
    if(typeA!==typeB)return typeA-typeB;
    const encA=ENC_ORDER[a.enchant]??3,encB=ENC_ORDER[b.enchant]??3;
    if(encA!==encB)return encA-encB;
    return a._idx-b._idx;
  });
  S.accCards=S.accCards.map(({_idx,...c})=>c);
}
function getPendOrder(type){return type==='태양'?0:type==='달'?1:2;}
function getPendSum(p){
  const mo=p.type==='태양'?3:p.type==='달'?2:1;
  return p.options.slice(0,mo).reduce((s,o)=>s+(o.val||0),0);
}
function sortPendants(){
  S.pendants=S.pendants.map((p,i)=>({...p,_idx:i}));
  S.pendants.sort((a,b)=>{
    const oA=getPendOrder(a.type),oB=getPendOrder(b.type);
    if(oA!==oB)return oA-oB;
    const sA=getPendSum(a),sB=getPendSum(b);
    if(sB!==sA)return sB-sA;
    return a._idx-b._idx;
  });
  S.pendants=S.pendants.map(({_idx,...p})=>p);
}

  if(a.atk>0)p.push(`<span style="color:var(--atc)">공${(a.atk*100).toFixed(0)}%</span>`);

function openAccDrop(ci){
  filterAccDrop(ci, document.getElementById('acc-inp-'+ci).value);
  const drop=document.getElementById('acc-drop-'+ci);
  drop.classList.add('open');
  const sec=drop.closest('.sec');
  if(sec)sec.style.overflow='visible';
}

function closeAccDrop(ci,el){
  const drop=document.getElementById('acc-drop-'+ci);
  if(!drop)return;
  drop.classList.remove('open');
  const sec=drop.closest('.sec');
  if(sec)sec.style.overflow='';
  if(el){
    const valid=ACC_DB.some(a=>a.n===el.value);
    if(!valid){
      S.accCards[ci].name='';
      S.accCards[ci].enchant='none';
      el.value='';
      qSave();
    }
  }
}

function accNavKey(e,ci){
  const drop=document.getElementById('acc-drop-'+ci);
  if(!drop||!drop.classList.contains('open'))return;
  const items=[...drop.querySelectorAll('.acc-drop-item')];
  if(!items.length)return;
  const cur=drop.querySelector('.acc-drop-item.focused');
  let idx=items.indexOf(cur);
  if(e.key==='ArrowDown'){
    e.preventDefault();
    idx=Math.min(idx+1,items.length-1);
    items.forEach(el=>el.classList.remove('focused'));
    items[idx].classList.add('focused');
    items[idx].scrollIntoView({block:'nearest'});
  }else if(e.key==='ArrowUp'){
    e.preventDefault();
    idx=Math.max(idx-1,0);
    items.forEach(el=>el.classList.remove('focused'));
    items[idx].classList.add('focused');
    items[idx].scrollIntoView({block:'nearest'});
  }else if(e.key==='Enter'){
    e.preventDefault();
    if(cur)cur.dispatchEvent(new MouseEvent('mousedown'));
  }else if(e.key==='Escape'){
    closeAccDrop(ci);
  }
}

function filterAccDrop(ci,q){
  const drop=document.getElementById('acc-drop-'+ci);
  if(!drop)return;
  const kw=q.toLowerCase().trim();
  const statOnly=document.getElementById('chk-stat-only')?.checked;
  let filtered=statOnly?ACC_DB.filter(a=>!a.n.startsWith('빛뿔')):ACC_DB;
  if(kw)filtered=filtered.filter(a=>a.n.toLowerCase().includes(kw));
  drop.innerHTML=filtered.slice(0,30).map(a=>
    `<div class="acc-drop-item" onmousedown="selectAcc(${ci},'${a.n.replace(/'/g,"\'")}')">
      <span class="acc-drop-name">${a.n}</span>
    </div>`
  ).join('');
  drop.classList.add('open');
}

  const mo=p.type==='태양'?3:p.type==='달'?2:1;
  return p.options.slice(0,mo).map(o=>`${SK[o.stat]||'?'}${o.val||0}%`).join('/');
}

  renderPends();qSave();
}

function validatePOpt(el,pi,oi){
  const n=parseInt(el.value);
  if(el.value===''||isNaN(n)||n<1||n>6){
    alert('1~6 사이의 정수를 입력해주세요.');
    el.value='';
    return;
  }
  onPOpt(pi,oi,'val',n);
}

function onPOpt(pi,oi,field,val){
  if(!S.pendants[pi].options[oi])S.pendants[pi].options[oi]={stat:'hp',val:1};
  S.pendants[pi].options[oi][field]=val;
  updatePendSummary(pi);
  resetSimResult();
  qSave();
}

}

function normalizeDragonCards(){
  if(!S.dragonCards)S.dragonCards=mkDragonCards();
  DRAGON_CATS.forEach(cat=>{
    if(!Array.isArray(S.dragonCards[cat]))S.dragonCards[cat]=[];
    S.dragonCards[cat]=S.dragonCards[cat].map(card=>({
      ...mkDragonCard(),
      ...card,
      opts:[...(card.opts||[])]
    }));
    S.dragonCards[cat].forEach(card=>{
      while(card.opts.length<4)card.opts.push({stat:'',type:''});
      card.opts=card.opts.slice(0,4).map(o=>({stat:o?.stat||'',type:o?.type||''}));
      card.uid=card.uid||newDragonUid();
      card.bonus=card.bonus||'';
      card.name=card.name||'';
      card.dtype=card.dtype||'';
      card.dupe=!!card.dupe;
      if(!card.grade&&BASE[card.growth])card.grade=card.growth;
      card.grade=BASE[card.grade]?card.grade:'9.0';
      card.growth=['강림(축복)','강림','진각'].includes(card.growth)?card.growth:'강림(축복)';
      if(card.growth==='강림'||card.growth==='진각')card.grade='7.0';
    });
  });
}

  return String(name||'').replace(/\s+/g,'').toLowerCase();
}

function dragonDbNames(entry){
  if(typeof entry==='string')return[entry];
  if(!entry||typeof entry!=='object')return[];
  return [entry.name,...(entry.aliases||[])].filter(Boolean);
}

function dragonOfficialName(entry){
  return typeof entry==='string'?entry:entry?.name||'';
}

function findDragonMatch(name){
  const key=normDragonName(name);
  if(!key)return null;
  const prefixMatches=[];
  for(const [typeOrName,namesOrType] of Object.entries(DRAGON_TYPE_DB)){
    if(Array.isArray(namesOrType)&&DTYPES.includes(typeOrName)){
      for(const entry of namesOrType){
        const official=dragonOfficialName(entry);
        if(!official)continue;
        if(dragonDbNames(entry).some(dbName=>normDragonName(dbName)===key))return{name:official,type:typeOrName};
        if(key.length>=2&&normDragonName(official).startsWith(key))prefixMatches.push({name:official,type:typeOrName});
      }
    }else if(typeof namesOrType==='string'&&DTYPES.includes(namesOrType)){
      if(normDragonName(typeOrName)===key)return{name:typeOrName,type:namesOrType};
    }
  }
  return prefixMatches.length===1?prefixMatches[0]:null;
}

function findDragonType(name){
  return findDragonMatch(name)?.type||'';
}

function findDragonAttr(name){
  const key=normDragonName(name);
  if(!key)return'';
  for(const [attr,names] of Object.entries(DRAGON_ATTR_DB)){
    if((names||[]).some(n=>normDragonName(n)===key))return attr;
  }
  return'';
}

function dragonIdentityKey(card){
  const nameKey=normDragonName(card?.name);
  return card?.dupe&&card?.uid?card.uid:nameKey;
}

function findUncheckedDragonDuplicate(){
  const byName=new Map();
  DRAGON_CATS.forEach(cat=>{
    (S.dragonCards?.[cat]||[]).forEach((card,idx)=>{
      const key=normDragonName(card.name);
      if(!key)return;
      if(!byName.has(key))byName.set(key,[]);
      byName.get(key).push({cat,idx,card});
    });
  });
  for(const group of byName.values()){
    if(group.length>1&&group.some(x=>!x.card.dupe))return group;
  }
  return null;
}

function hasOtherDragonWithSameName(cat,idx){
  const card=S.dragonCards?.[cat]?.[idx];
  const key=normDragonName(card?.name);
  if(!key)return false;
  return DRAGON_CATS.some(c=>(S.dragonCards?.[c]||[]).some((other,oi)=>!(c===cat&&oi===idx)&&normDragonName(other.name)===key));
}

function warnUncheckedDragonDuplicate(){
  const group=findUncheckedDragonDuplicate();
  if(!group)return;
  const name=group[0].card.name;
  alert(`동일한 용 이름 "${name}"이 입력되어 있습니다. 같은 개체가 아니라면 각 카드의 중복 여부를 체크해주세요.`);
}

function syncDragonDupeGroupByName(name){
  const key=normDragonName(name);
  if(!key)return false;
  const group=[];
  DRAGON_CATS.forEach(cat=>{
    (S.dragonCards?.[cat]||[]).forEach(card=>{
      if(normDragonName(card.name)===key)group.push(card);
    });
  });
  if(group.length<2||!group.some(card=>card.dupe))return false;
  group.forEach(card=>{card.dupe=true;});
  return true;
}

function onDragonNameInput(cat,idx,val){
  normalizeDragonCards();
  S.dragonCards[cat][idx].name=val;
  qSave();
}

function applyDragonNameType(cat,idx){
  normalizeDragonCards();
  const card=S.dragonCards[cat][idx];
  const match=findDragonMatch(card.name);
  if(match){
    const attr=findDragonAttr(match.name);
    if(attr&&attr!==cat){
      card.name='';card.dtype='';
      renderDragonInfo();qSave();return;
    }
    if(!isAllowedDragon(cat,match.name)){
      card.name='';card.dtype='';
      renderDragonInfo();qSave();return;
    }
    card.name=match.name;
    card.dtype=match.type;
  } else if(card.name){
    card.name='';card.dtype='';
    renderDragonInfo();qSave();return;
  }
  const synced=syncDragonDupeGroupByName(card.name);
  if(match||synced)renderDragonInfo();
  warnUncheckedDragonDuplicate();
  qSave();
}

function onDragonField(cat,idx,field,val){
  normalizeDragonCards();
  const card=S.dragonCards[cat][idx];
  card[field]=val;
  if(field==='growth'&&(val==='강림'||val==='진각'))card.grade='7.0';
  if(field==='grade'&&(card.growth==='강림'||card.growth==='진각'))card.grade='7.0';
  if(field==='growth'||field==='grade')renderDragonInfo();
  qSave();
}

function onDragonDupe(cat,idx,checked){
  normalizeDragonCards();
  const card=S.dragonCards[cat][idx];
  const key=normDragonName(card?.name);
  if(checked&&key){
    card.dupe=true;
    syncDragonDupeGroupByName(card.name);
    renderDragonInfo();
    qSave();
    return;
  }
  if(!checked&&hasOtherDragonWithSameName(cat,idx)){
    alert(`동일한 용 이름 "${card.name}"이 입력되어 있습니다. 중복 개체가 아니라면 용 이름을 다르게 입력해주세요.`);
  }
  card.dupe=checked;
  qSave();
}

// 보유 젬을 풀(pool)로 변환. 각 원소: {s:스탯, lv:단계, cnt:보유수, h:체기여, a:공기여, d:방기여}
function buildPool(){
  const pool=[];
  for(const s of SKEYS)for(const lv of [37,38,39,40]){
    const cnt=S.gems[s]?.[lv]||0;
    if(cnt>0)pool.push({s,lv,cnt,h:s==='hp'?GEM[lv].hp:0,a:s==='atk'?GEM[lv].atk:0,d:s==='def'?GEM[lv].def:0});
  }
  for(const s of SKEYS){
    const lv=FALLBACK_GEM_LV;
    pool.push({s,lv,cnt:FALLBACK_GEM_COUNT,h:s==='hp'?GEM[lv].hp:0,a:s==='atk'?GEM[lv].atk:0,d:s==='def'?GEM[lv].def:0});
  }
  return pool;
}

// 5슬롯 젬 배분 경우의 수 열거 (백트래킹). 반환: [[각 풀 원소 사용 개수], ...]
function genAllocs(pool,slots,includePartial=false){
  const total=pool.reduce((s,g)=>s+g.cnt,0);
  const maxS=Math.min(slots,total);
  const res=[];
  const cur=new Array(pool.length).fill(0);
  function bt(i,rem){
    if(i===pool.length){if(rem===0)res.push([...cur]);return;}
    for(let k=0;k<=Math.min(pool[i].cnt,rem);k++){cur[i]=k;bt(i+1,rem-k);}
  }
  if(includePartial){
    res.push(new Array(pool.length).fill(0));
    for(let use=1;use<=maxS;use++)bt(0,use);
  }else if(maxS>0)bt(0,maxS);
  if(!res.length)res.push(new Array(pool.length).fill(0));
  return res;
}

function gemAllocKey(alloc){
  return alloc.join(',');
}

function gemAllocShape(pool,alloc){
  return SKEYS.map(stat=>alloc.reduce((sum,n,i)=>sum+(pool[i].s===stat?n:0),0)).join('/');
}

function gemAllocScore(pool,alloc){
  return alloc.reduce((sum,n,i)=>sum+n*(pool[i].h+pool[i].a+pool[i].d),0);
}

function maxGemLevel(pool,alloc){
  let max=0;
  alloc.forEach((n,i)=>{if(n>0)max=Math.max(max,pool[i].lv);});
  return max;
}

function getBaselineGemLv(stat,totalNeed=15){
  let sum=0;
  for(const lv of [40,39,38,37]){
    sum+=S.gems[stat]?.[lv]||0;
    if(sum>=totalNeed)return lv;
  }
  return FALLBACK_GEM_LV;
}

function buildBaselineGemPool(totalNeed=15){
  return SKEYS.map(s=>{
    const lv=getBaselineGemLv(s,totalNeed);
    return {s,lv,cnt:totalNeed,h:s==='hp'?GEM[lv].hp:0,a:s==='atk'?GEM[lv].atk:0,d:s==='def'?GEM[lv].def:0};
  });
}

function allocRawToItems(pool,alloc){
  const items=[];
  alloc.forEach((k,i)=>{
    for(let n=0;n<k;n++){
      const g=pool[i];
      items.push({s:g.s,lv:g.lv,h:g.h,a:g.a,d:g.d});
    }
  });
  return items;
}

function compressGemItems(items){
  const groups=new Map();
  items.forEach(g=>{
    const key=`${g.s}|${g.lv}`;
    groups.set(key,{k:(groups.get(key)?.k||0)+1,g});
  });
  return [...groups.values()].sort((a,b)=>{
    const so=SKEYS.indexOf(a.g.s)-SKEYS.indexOf(b.g.s);
    return so||b.g.lv-a.g.lv;
  });
}

function applyGemItems(opt,items){
  let gH=0,gA=0,gD=0;
  items.forEach(g=>{gH+=g.h;gA+=g.a;gD+=g.d;});
  const c=opt._calc;
  opt.fH=calcStat(c.bh,gH,24,c.aH,c.sPct.hp,c.pH,c.sP.hp,c.sB.hp,c.coll.hp,c.bufH);
  opt.fA=calcStat(c.ba,gA,6,c.aA,c.sPct.atk,c.pA,c.sP.atk,c.sB.atk,c.coll.atk,c.bufA);
  opt.fD=calcStat(c.bd,gD,6,c.aD,c.sPct.def,c.pD,c.sP.def,c.sB.def,c.coll.def,c.bufD);
  opt.bv=opt.fH*opt.fA*opt.fD;
  opt.alloc=compressGemItems(items);
}

function getUpgradeGemTokens(){
  const tokens=[];
  for(const s of SKEYS){
    const base=getBaselineGemLv(s);
    for(const lv of [40,39,38,37]){
      if(lv<=base)continue;
      const cnt=S.gems[s]?.[lv]||0;
      for(let i=0;i<cnt;i++)tokens.push({s,lv,h:s==='hp'?GEM[lv].hp:0,a:s==='atk'?GEM[lv].atk:0,d:s==='def'?GEM[lv].def:0});
    }
  }
  return tokens.sort((a,b)=>b.lv-a.lv);
}

function applyBestGemUpgrades(deck){
  deck.forEach(opt=>{opt._gemItems=allocRawToItems(opt._pool,opt.allocRaw);});
  for(const token of getUpgradeGemTokens()){
    let best=null;
    deck.forEach((opt,oi)=>{
      opt._gemItems.forEach((cur,gi)=>{
        if(cur.s!==token.s||cur.lv>=token.lv)return;
        const before=opt.bv;
        const test=[...opt._gemItems];
        test[gi]=token;
        let gH=0,gA=0,gD=0;
        test.forEach(g=>{gH+=g.h;gA+=g.a;gD+=g.d;});
        const c=opt._calc;
        const fH=calcStat(c.bh,gH,24,c.aH,c.sPct.hp,c.pH,c.sP.hp,c.sB.hp,c.coll.hp,c.bufH);
        const fA=calcStat(c.ba,gA,6,c.aA,c.sPct.atk,c.pA,c.sP.atk,c.sB.atk,c.coll.atk,c.bufA);
        const fD=calcStat(c.bd,gD,6,c.aD,c.sPct.def,c.pD,c.sP.def,c.sB.def,c.coll.def,c.bufD);
        const bv=fH*fA*fD;
        const gain=bv-before;
        if(gain>0&&(!best||gain>best.gain))best={gain,oi,gi,token};
      });
    });
    if(best){
      deck[best.oi]._gemItems[best.gi]=best.token;
      applyGemItems(deck[best.oi],deck[best.oi]._gemItems);
    }
  }
  deck.forEach(opt=>delete opt._gemItems);
  return deck.sort((a,b)=>b.bv-a.bv);
}

function genDiverseGemAllocs(pool,slots,perShapeLimit=24){
  const all=genAllocs(pool,slots,true);
  const groups=new Map();
  all.forEach(alloc=>{
    const shape=gemAllocShape(pool,alloc);
    if(!groups.has(shape))groups.set(shape,[]);
    groups.get(shape).push(alloc);
  });
  const seen=new Set();
  const result=[];
  groups.forEach(list=>{
    list.sort((a,b)=>gemAllocScore(pool,b)-gemAllocScore(pool,a));
    const picks=[...list.slice(0,perShapeLimit)];
    [40,39,38,37].forEach(lv=>{
      const capped=list.find(alloc=>maxGemLevel(pool,alloc)<=lv);
      if(capped)picks.push(capped);
    });
    picks.forEach(alloc=>{
      const key=gemAllocKey(alloc);
      if(seen.has(key))return;
      seen.add(key);
      result.push(alloc);
    });
  });
  return result;
}

function optKey(opt){
  return `${opt.accId}|${opt.pendId??'none'}|${opt.enc}|${opt.allocRaw.join(',')}`;
}

function mergeOptionGroups(groups,limit){
  const seen=new Set();
  const merged=[];
  groups.forEach(group=>{
    group
      .filter(Boolean)
      .sort((a,b)=>b.bv-a.bv)
      .forEach(opt=>{
        const key=optKey(opt);
        if(seen.has(key))return;
        seen.add(key);
        merged.push(opt);
      });
  });
  return merged.sort((a,b)=>b.bv-a.bv);
}

/*
 * 최종스탯 계산 공식 (게임 수식 그대로 INT = Math.floor):
 *   A = base + gem + potion
 *   B = INT(A * (1 + acc% + enc%))
 *   C = INT(B * (1 + spirit%))
 *   D = INT(C * (1 + pendant%))
 *   E = INT(INT(spiritPlus * (1 + spirit%)) * (1 + pendant%))
 *   F = INT(spiritBonus * (1 + pendant%))
 *   buf = INT(bufLevel * base * 0.20)
 *   finalStat = D + E + F + collection + buf
 */
function calcStat(B,G,P,AP,SP,PP,SL,SB,C,BU){
  const a=Math.floor((B+G+P)*(1+AP));
  const b=Math.floor(a*(1+SP));
  const c=Math.floor(b*(1+PP));
  const d=Math.floor(Math.floor(SL*(1+SP))*(1+PP));
  const e=Math.floor(SB*(1+PP));
  return c+d+e+C+BU;
}

// 정령 상태를 스탯별 + / % / 부가옵 기여로 변환
function procSpirit(){
  const sp=S.spirit;
  const lv=5;
  const plus={hp:0,atk:0,def:0},pct={hp:0,atk:0,def:0},bonus={hp:0,atk:0,def:0};
  for(let i=0;i<4;i++){
    if(i+1>lv)continue;
    const o=sp.opts[i];
    if(!o||!o.stat||!o.type)continue;
    if(o.type==='+')plus[o.stat]+=SP_PLUS[o.stat][i+1];
    else if(o.type==='%')pct[o.stat]+=SP_PCT[i+1];
  }
  if(sp.bonus&&SP_BONUS[sp.bonus])bonus[sp.bonus]=SP_BONUS[sp.bonus];
  return{plus,pct,bonus};
}

function runSim(){

    .map((c,i)=>({...ACC_DB.find(a=>a.n===c.name),_accId:i,_enc:encMode==='infinite'?'none':c.enchant}))
    .filter(a=>a.n);

function getPends(excSun){
  const raw=[null,...S.pendants.map((p,i)=>({...p,_pendId:i}))];
  const filtered=excSun?raw.filter(p=>!p||p.type!=='태양'):raw;
  return filtered.length?filtered:[null];
}

function calcPendPct(pend){
  let pH=0,pA=0,pD=0;
  if(pend){
    const mo=pend.type==='태양'?3:pend.type==='달'?2:1;
    pend.options.slice(0,mo).forEach(o=>{
      if(!o||!o.stat)return;
      const v=(o.val||0)/100;
      if(o.stat==='hp')pH+=v;else if(o.stat==='atk')pA+=v;else pD+=v;
    });
  }
  return{pH,pA,pD};
}

function procSpiritFrom(sp){
  const plus={hp:0,atk:0,def:0},pct={hp:0,atk:0,def:0},bonus={hp:0,atk:0,def:0};
  const opts=sp?.opts||[];
  for(let i=0;i<4;i++){
    const o=opts[i];
    if(!o||!o.stat||!o.type)continue;
    if(o.type==='+')plus[o.stat]+=SP_PLUS[o.stat][i+1];
    else if(o.type==='%')pct[o.stat]+=SP_PCT[i+1];
  }
  if(sp?.bonus&&SP_BONUS[sp.bonus])bonus[sp.bonus]=SP_BONUS[sp.bonus];
  return{plus,pct,bonus};
}

function receivesWeeklyEffect(dragon,cfg){
  if(!dragon||!cfg)return false;
  return dragon.attr===cfg.attr||dragon.dtype===cfg.type;
}

function isDebuffedDragon(dragon){
  return receivesWeeklyEffect(dragon,S.settingBuffs?.debuff);
}

function getDragonBuffCounts(dragon){
  const counts={hp:0,atk:0,def:0};
  const cfg=S.settingBuffs?.buff;
  if(!dragon||!cfg)return counts;
  if(dragon.attr===cfg.attr&&counts[cfg.stat1]!=null)counts[cfg.stat1]++;
  if(dragon.dtype===cfg.type&&counts[cfg.stat2]!=null)counts[cfg.stat2]++;
  return counts;
}

function doSimDeck(ownedAcc,dragons,excSun){
  const pool=buildBaselineGemPool(15);
  const allocs=genAllocs(pool,5,true);
  const pends=getPends(excSun);
  const coll=S.coll;
  const encMode=document.querySelector('input[name="enc-mode"]:checked')?.value||'fixed';
  const optionLimit=80;
  const dragonOptionSets=[];

  for(const dragon of dragons){
    const {plus:sP,pct:sPct,bonus:sB}=procSpiritFrom(dragon);
    const bs=BASE[dragon.grade][dragon.dtype];
    const bh=bs.hp,ba=bs.atk,bd=bs.def;
    const buff=getDragonBuffCounts(dragon);
    const bufH=Math.floor(buff.hp*bh*.2);
    const bufA=Math.floor(buff.atk*ba*.2);
    const bufD=Math.floor(buff.def*bd*.2);
    let options=[];
    const bestByAcc=new Map();
    const bestByPend=new Map();
    const bestByAccPend=new Map();
    const bestByResourceShape=new Map();
    let minBV=-Infinity;

    for(const acc of ownedAcc){
      const encs=encMode==='infinite'?['hp','atk','def']:[acc._enc||'none'];
      for(const enc of encs){
        const aH=acc.hp+(enc==='hp'?.21:0);
        const aA=acc.atk+(enc==='atk'?.21:0);
        const aD=acc.def+(enc==='def'?.21:0);
        for(const pend of pends){
          const{pH,pA,pD}=calcPendPct(pend);
          for(const alloc of allocs){
            let gH=0,gA=0,gD=0;
            for(let i=0;i<alloc.length;i++){gH+=alloc[i]*pool[i].h;gA+=alloc[i]*pool[i].a;gD+=alloc[i]*pool[i].d;}
            const fH=calcStat(bh,gH,24,aH,sPct.hp,pH,sP.hp,sB.hp,coll.hp,bufH);
            const fA=calcStat(ba,gA,6,aA,sPct.atk,pA,sP.atk,sB.atk,coll.atk,bufA);
            const fD=calcStat(bd,gD,6,aD,sPct.def,pD,sP.def,sB.def,coll.def,bufD);
            const bv=fH*fA*fD;
            const opt={
              bv,dragon,accN:acc.n,accId:acc._accId,enc,pend,pendId:pend?pend._pendId:null,
              allocRaw:[...alloc],alloc:alloc.map((k,i)=>({k,g:pool[i]})).filter(x=>x.k>0),
              fH,fA,fD,buff,_pool:pool,_calc:{bh,ba,bd,aH,aA,aD,pH,pA,pD,sPct,sP,sB,coll,bufH,bufA,bufD}
            };
            if(!bestByAcc.has(acc._accId)||opt.bv>bestByAcc.get(acc._accId).bv)bestByAcc.set(acc._accId,opt);
            const pendKey=pend?pend._pendId:'none';
            const pairKey=`${acc._accId}|${pendKey}`;
            if(!bestByPend.has(pendKey)||opt.bv>bestByPend.get(pendKey).bv)bestByPend.set(pendKey,opt);
            if(!bestByAccPend.has(pairKey)||opt.bv>bestByAccPend.get(pairKey).bv)bestByAccPend.set(pairKey,opt);
            const gemCount=opt.allocRaw.reduce((s,n)=>s+n,0);
            const gemByStat=SKEYS.map(stat=>opt.allocRaw.reduce((sum,n,i)=>sum+(pool[i].s===stat?n:0),0)).join('/');
            const gemLvSig=opt.allocRaw.map((n,i)=>n?`${pool[i].s}${pool[i].lv}:${n}`:'').filter(Boolean).join(',');
            const shapeKey=`${acc._accId}|${pend?pend._pendId:'none'}|${enc}|${gemCount}|${gemByStat}|${gemLvSig}`;
            if(!bestByResourceShape.has(shapeKey)||opt.bv>bestByResourceShape.get(shapeKey).bv)bestByResourceShape.set(shapeKey,opt);
            if(opt.bv>minBV||options.length<optionLimit){
              let lo=0,hi=options.length;
              while(lo<hi){const m=(lo+hi)>>1;if(options[m].bv>=opt.bv)lo=m+1;else hi=m;}
              options.splice(lo,0,opt);
              if(options.length>optionLimit)options.pop();
              minBV=options.length===optionLimit?options[optionLimit-1].bv:-Infinity;
            }
          }
        }
      }
    }
    if(options.length){
      const topOptions=[...options].sort((a,b)=>b.bv-a.bv).slice(0,optionLimit);
      options=mergeOptionGroups([
        topOptions,
        [...bestByAcc.values()],
        [...bestByPend.values()],
        [...bestByAccPend.values()],
        [...bestByResourceShape.values()].sort((a,b)=>b.bv-a.bv).slice(0,optionLimit)
      ],optionLimit*3);
      dragonOptionSets.push({dragon,options,bestBV:options[0].bv});
    }
  }

  dragonOptionSets.sort((a,b)=>b.bestBV-a.bestBV);
  const deck=findBestDeck(dragonOptionSets,pool);
  return deck.length?applyBestGemUpgrades(deck):deck;
}

function deckOptionsCompatible(a,b,pool){
  if(a.accId===b.accId)return false;
  if(a.pendId!=null&&a.pendId===b.pendId)return false;
  for(let i=0;i<pool.length;i++){
    if((a.allocRaw[i]||0)+(b.allocRaw[i]||0)>pool[i].cnt)return false;
  }
  return true;
}

function deckCanAdd(deck,opt,pool){
  const gemUse=new Array(pool.length).fill(0);
  for(const cur of deck){
    if(cur.accId===opt.accId)return false;
    if(cur.pendId!=null&&opt.pendId!=null&&cur.pendId===opt.pendId)return false;
    for(let i=0;i<pool.length;i++)gemUse[i]+=cur.allocRaw[i]||0;
  }
  for(let i=0;i<pool.length;i++){
    if(gemUse[i]+(opt.allocRaw[i]||0)>pool[i].cnt)return false;
  }
  return true;
}

function findBestDeck(dragonOptionSets,pool){
  let bestDeck=null,bestScore=-Infinity;
  for(let i=0;i<dragonOptionSets.length-2;i++){
    for(let j=i+1;j<dragonOptionSets.length-1;j++){
      for(let k=j+1;k<dragonOptionSets.length;k++){
        const aSet=dragonOptionSets[i],bSet=dragonOptionSets[j],cSet=dragonOptionSets[k];
        if(aSet.bestBV+bSet.bestBV+cSet.bestBV<=bestScore)continue;
        for(const a of aSet.options){
          if(a.bv+bSet.bestBV+cSet.bestBV<=bestScore)break;
          for(const b of bSet.options){
            if(a.bv+b.bv+cSet.bestBV<=bestScore)break;
            if(!deckOptionsCompatible(a,b,pool))continue;
            for(const c of cSet.options){
              if(a.bv+b.bv+c.bv<=bestScore)break;
              if(!deckCanAdd([a,b],c,pool))continue;
              const score=a.bv+b.bv+c.bv;
              if(score>bestScore){
                bestScore=score;
                bestDeck=[a,b,c].sort((x,y)=>y.bv-x.bv);
              }
            }
          }
        }
      }
    }
  }
  return bestDeck||[];
}

    const bufResults=[];

    for(const buf of bufCombos){
      const bufH=Math.floor(buf.h*bh*.2);
      const bufA=Math.floor(buf.a*ba*.2);
      const bufD=Math.floor(buf.d*bd*.2);
      const top5=[];
      let minBV=-Infinity;

      for(const acc of ownedAcc){
        const encs=encMode==='infinite'?['hp','atk','def']:[acc._enc||'none'];
        for(const enc of encs){
          const aH=acc.hp+(enc==='hp'?.21:0);
          const aA=acc.atk+(enc==='atk'?.21:0);
          const aD=acc.def+(enc==='def'?.21:0);
          for(const pend of pends){
            const{pH,pA,pD}=calcPendPct(pend);
            for(const alloc of allocs){
              let gH=0,gA=0,gD=0;
              for(let i=0;i<alloc.length;i++){gH+=alloc[i]*pool[i].h;gA+=alloc[i]*pool[i].a;gD+=alloc[i]*pool[i].d;}
              const fH=calcStat(bh,gH,24,aH,sPct.hp,pH,sP.hp,sB.hp,coll.hp,bufH);
              const fA=calcStat(ba,gA,6,aA,sPct.atk,pA,sP.atk,sB.atk,coll.atk,bufA);
              const fD=calcStat(bd,gD,6,aD,sPct.def,pD,sP.def,sB.def,coll.def,bufD);
              const bv=fH*fA*fD;
              if(bv>minBV||top5.length<5){
                let lo=0,hi=top5.length;
                while(lo<hi){const m=(lo+hi)>>1;if(top5[m].bv>=bv)lo=m+1;else hi=m;}
                top5.splice(lo,0,{bv,accN:acc.n,enc,pend,alloc:alloc.map((k,i)=>({k,g:pool[i]})).filter(x=>x.k>0),fH,fA,fD});
                if(top5.length>5)top5.pop();
                minBV=top5.length===5?top5[4].bv:-Infinity;
              }
            }
          }
        }
      }
      bufResults.push({label:buf.label,w:buf.w,top5,bestBV:top5.length?top5[0].bv:0});
    }

    bufResults.sort((a,b)=>b.bestBV-a.bestBV);
    const avgBV=bufResults.reduce((s,b)=>s+b.w*b.bestBV,0);
    const peakBV=bufResults[0].bestBV;
    const bottomBV=bufResults[bufResults.length-1].bestBV;
    results.push({dt,avgBV,peakBV,bottomBV,bufResults});
  }

  results.sort((a,b)=>b.avgBV-a.avgBV);
  return results;
}

function fmtWeeklyBuff(buff){

  return count?`<span style="color:var(--gold);font-weight:800">${count}버프</span>`:'<span style="color:var(--dim)">버프 없음</span>';
}

//평균 비밸 결과 출력
function renderResAvg(results){
  const el=document.getElementById('res-body-avg');
  if(!results.length){el.innerHTML='<div style="padding:30px;text-align:center;color:var(--dim)">결과 없음</div>';return;}

    <th>타입</th><th>고점</th><th>저점</th><th>평균 비밸</th>
  </tr></thead><tbody>`;

    const dc=DCOLORS[r.dt];

      </td>

function toggleAvgDetail(i){
  const el=document.getElementById(`avg-detail-${i}`);
  const arrow=document.getElementById('avg-arrow-'+i);
  if(!el)return;
  const open=el.style.display==='none';
  el.style.display=open?'':'none';
  if(arrow)arrow.textContent=open?'▲':'▼';
}

// 젬 배분을 "체2(40,40) 공1(39) 방2(40,38)" 형식으로 포맷
function fmtGem(alloc){
  if(!alloc||!alloc.length)return'<span style="color:var(--dimmer)">없음</span>';
  const bySt={hp:[],atk:[],def:[]};
  alloc.forEach(({k,g})=>{for(let i=0;i<k;i++)bySt[g.s].push(g.lv);});
  const cols={hp:'var(--hpc)',atk:'var(--atc)',def:'var(--dfc)'};
  const parts=[];
  for(const s of SKEYS){
    const lvs=bySt[s].sort((a,b)=>b-a);
    if(lvs.length)parts.push(`<span class="gem-tag" style="color:${cols[s]}">${SK[s]}${lvs.length}(${lvs.join(',')})</span>`);
  }
  return parts.length?parts.join(''):'<span style="color:var(--dimmer)">없음</span>';
}

// 펜던트 포맷 "태양의 펜던트 (체6%/공4%/방3%)"
function fmtPend(p){
  if(!p)return'<span style="color:var(--dimmer)">없음</span>';
  const mo=p.type==='태양'?3:p.type==='달'?2:1;
  const opts=p.options.slice(0,mo).filter(o=>o&&o.stat).map(o=>{
    const col=o.stat==='hp'?'#fbbf24':o.stat==='atk'?'#f87171':'#60a5fa';
    return`<span style="color:${col}">${SK[o.stat]}</span><span style="color:#fff">${o.val||0}%</span>`;
  }).join('<span style="color:#aab4cc">/</span>');
  const img=IMG_PEND[p.type]?`<img src="${IMG_PEND[p.type]}" style="width:36px;height:36px;object-fit:contain;border-radius:4px">`:'';
  return`<div style="display:flex;align-items:center;gap:8px">${img}<div style="color:var(--text)">${p.type}의 펜던트<br><small>(${opts})</small></div></div>`;
}
