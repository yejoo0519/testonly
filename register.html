<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원가입</title>
<link id="theme-css" rel="stylesheet" href="./theme-dark.css">
<script src="./theme.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:28px;width:100%;max-width:380px}
.box h2{font-size:18px;color:var(--text);margin-bottom:20px;text-align:center}
.field{margin-bottom:14px}
.field label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block}
.field input{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border3);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit}
.field input:focus{outline:none;border-color:var(--accent)}
.field-hint{font-size:11px;color:var(--text4);margin-top:3px}
.field-hint.error{color:#ef5350}
.field-hint.success{color:#66bb6a}
.btn{width:100%;padding:11px;background:linear-gradient(90deg,#4a90d9,#5dcff5);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
.btn:hover{opacity:0.9}
.msg{font-size:12px;margin-top:10px;text-align:center}
.msg.error{color:#ef5350}
.msg.success{color:#66bb6a}
.link{text-align:center;margin-top:14px;font-size:12px;color:var(--text4)}
.link a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="box">
  <h2>회원가입</h2>
  <div class="field">
    <label>아이디</label>
    <input id="username" type="text" placeholder="아이디 입력">
  </div>
  <div class="field">
    <label>닉네임</label>
    <input id="nickname" type="text" placeholder="닉네임 입력">
    <div class="field-hint">게시판에 표시되는 이름입니다.</div>
  </div>
  <div class="field">
    <label>친구코드 <span style="color:var(--text4);font-weight:400">(7자리)</span></label>
    <input id="friend_code" type="text" placeholder="친구코드 7자리 입력" maxlength="7" oninput="checkFriendCode()">
    <div class="field-hint" id="friend-code-hint">게임 내 친구코드 7자리를 입력해주세요.</div>
  </div>
  <div class="field">
    <label>비밀번호</label>
    <input id="password" type="password" placeholder="비밀번호 입력">
  </div>
  <div class="field">
    <label>비밀번호 확인</label>
    <input id="password2" type="password" placeholder="비밀번호 재입력">
  </div>
  <button class="btn" onclick="register()">가입하기</button>
  <div class="msg" id="msg"></div>
  <div class="link"><a href="./login.html">이미 계정이 있어요</a></div>
</div>

<script src="./sb_config.js"></script>
<script>
let friendCodeValid = false;

async function checkFriendCode() {
  const code = document.getElementById('friend_code').value.trim();
  const hint = document.getElementById('friend-code-hint');
  if(code.length === 0) {
    hint.className = 'field-hint';
    hint.textContent = '게임 내 친구코드 7자리를 입력해주세요.';
    friendCodeValid = false;
    return;
  }
  if(code.length !== 7) {
    hint.className = 'field-hint error';
    hint.textContent = '친구코드는 7자리여야 합니다.';
    friendCodeValid = false;
    return;
  }
  try {
    const rows = await supabase('GET', 'users', null, `?friend_code=eq.${encodeURIComponent(code)}&select=id`);
    if(rows && rows.length > 0) {
      hint.className = 'field-hint error';
      hint.textContent = '이미 사용 중인 친구코드입니다.';
      friendCodeValid = false;
    } else {
      hint.className = 'field-hint success';
      hint.textContent = '사용 가능한 친구코드입니다.';
      friendCodeValid = true;
    }
  } catch(e) {
    friendCodeValid = true;
  }
}

async function register() {
  const username = document.getElementById('username').value.trim();
  const nickname = document.getElementById('nickname').value.trim();
  const friend_code = document.getElementById('friend_code').value.trim();
  const password = document.getElementById('password').value;
  const password2 = document.getElementById('password2').value;
  const msg = document.getElementById('msg');

  if(!username || !password) { msg.className='msg error'; msg.textContent='아이디와 비밀번호를 입력해주세요.'; return; }
  if(!nickname) { msg.className='msg error'; msg.textContent='닉네임을 입력해주세요.'; return; }
  if(!friend_code) { msg.className='msg error'; msg.textContent='친구코드를 입력해주세요.'; return; }
  if(friend_code.length !== 7) { msg.className='msg error'; msg.textContent='친구코드는 7자리여야 합니다.'; return; }
  if(!friendCodeValid) { msg.className='msg error'; msg.textContent='친구코드를 확인해주세요.'; return; }
  if(username.length < 2) { msg.className='msg error'; msg.textContent='아이디는 2자 이상이어야 합니다.'; return; }
  if(nickname.length < 2) { msg.className='msg error'; msg.textContent='닉네임은 2자 이상이어야 합니다.'; return; }
  if(password.length < 4) { msg.className='msg error'; msg.textContent='비밀번호는 4자 이상이어야 합니다.'; return; }
  if(password !== password2) { msg.className='msg error'; msg.textContent='비밀번호가 일치하지 않습니다.'; return; }

  try {
    const hashed = await hashPassword(password);
    await supabase('POST', 'users', { username, nickname, friend_code, password: hashed });
    msg.className='msg success'; msg.textContent='가입 완료! 로그인 페이지로 이동합니다.';
    setTimeout(() => location.href='./login.html', 1200);
  } catch(e) {
    if(e.message.includes('unique')) msg.textContent='이미 사용 중인 아이디 또는 친구코드입니다.';
    else msg.textContent = '오류가 발생했습니다: ' + e.message;
    msg.className='msg error';
  }
}
</script>
</body>
</html>
